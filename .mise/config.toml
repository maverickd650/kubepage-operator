# Tool versions and dev tasks. This is the single source of truth — CI installs
# these via jdx/mise-action and runs `mise run <task>`, so local == CI.
# Renovate's native `mise` manager keeps [tools] current.
[tools]
go = "1.26.4"
golangci-lint = "2.12.2" # must match the `version:` in .custom-gcl.yml
kube-controller-tools = "0.21.0"
kustomize = "5.8.1"
setup-envtest = "0.24.1" # tracks sigs.k8s.io/controller-runtime in go.mod
helm = "4.2.2"
kind = "0.32.0"
kubectl = "1.36.2"
cosign = "3.1.1"
kubebuilder = "4.15.0"
kubeconform = "0.6.7"

[env]
# Image used by build/deploy targets; override with `IMG=... mise run docker-build`.
IMG = "{{ env.IMG | default(value='controller:latest') }}"
KIND_CLUSTER = "{{ env.KIND_CLUSTER | default(value='kubepage-operator-test-e2e') }}"
CONTAINER_TOOL = "{{ env.CONTAINER_TOOL | default(value='docker') }}"
# Passed to the Dockerfile's GO_VERSION build-arg; must match [tools].go above.
GO_VERSION = "1.26.4"

##@ Development

[tasks.manifests]
description = "Generate WebhookConfiguration, ClusterRole and CRD objects"
run = "controller-gen rbac:roleName=manager-role crd webhook paths='./...' output:crd:artifacts:config=config/crd/bases"

[tasks.generate]
description = "Generate DeepCopy method implementations"
run = "controller-gen object paths='./...'"

[tasks.templ-generate]
description = "Generate Go code from .templ dashboard templates"
run = "go tool templ generate ./..."

[tasks.fmt]
description = "Run go fmt against code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet against code"
run = "go vet ./..."

# golangci-lint is installed by mise as the stock binary, but this project uses
# module plugins (.custom-gcl.yml → logcheck), so we must build a custom binary
# and run that. `golangci-lint custom` is fast with a warm Go build cache.
[tasks.golangci-lint-custom]
description = "Build the custom golangci-lint binary with .custom-gcl.yml plugins"
sources = [".custom-gcl.yml"]
outputs = ["bin/golangci-lint-custom"]
run = "golangci-lint custom --destination bin --name golangci-lint-custom"

[tasks.lint]
description = "Run golangci-lint linter"
depends = ["golangci-lint-custom"]
run = "./bin/golangci-lint-custom run"

[tasks.lint-fix]
description = "Run golangci-lint linter and perform fixes"
depends = ["golangci-lint-custom"]
run = "./bin/golangci-lint-custom run --fix"

[tasks.lint-config]
description = "Verify golangci-lint linter configuration"
depends = ["golangci-lint-custom"]
run = "./bin/golangci-lint-custom config verify"

[tasks.test]
description = "Run unit tests"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
run = '''
# ENVTEST_K8S_VERSION is derived from k8s.io/api, e.g. v0.36.2 -> 1.36, so the
# envtest binaries track the k8s libraries automatically.
k8s_version="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | sed -E 's/.*v[0-9]+\.([0-9]+).*/1.\1/')}"
bin_dir="$PWD/bin"
mkdir -p "$bin_dir"
export KUBEBUILDER_ASSETS="$(setup-envtest use "$k8s_version" --bin-dir "$bin_dir" -p path)"
# `go list ./...` already excludes test/e2e on its own (its files carry a
# `//go:build e2e` tag, so they're invisible without `-tags=e2e`); the
# `grep -v /e2e` below is belt-and-suspenders, not the actual isolation
# mechanism — don't rely on this path filter alone if adding a new
# cluster-dependent test directory, give it a build tag too.
go test $(go list ./... | grep -v /e2e) -race -coverprofile cover.out
'''

[tasks.test-flaky-check]
description = "Re-run internal/dashboard's tests several times under -race to catch flaky/rare races"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
run = '''
# internal/dashboard's TestRunStopsAllGoroutinesOnContextCancel needs envtest
# (see the `test` task above for why), so this must set KUBEBUILDER_ASSETS
# too, not just `test` — these run as separate CI steps/shells, so the
# `export` in `test` doesn't carry over.
k8s_version="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | sed -E 's/.*v[0-9]+\.([0-9]+).*/1.\1/')}"
bin_dir="$PWD/bin"
mkdir -p "$bin_dir"
export KUBEBUILDER_ASSETS="$(setup-envtest use "$k8s_version" --bin-dir "$bin_dir" -p path)"
# internal/controller is Ginkgo-based and rejects `go test -count>1` ("Ginkgo
# does not support using go test -count to rerun suites"), so this only
# targets internal/dashboard, the package with this repo's actual concurrency
# (Poller/Store) — see internal/dashboard/poller.go and store.go.
go test -race -count=5 ./internal/dashboard/...
'''

[tasks.test-chart-validate]
description = "Validate rendered Helm templates' built-in-kind manifests against upstream Kubernetes schemas"
depends = ["manifests"]
# kubeconform validates against JSON Schema, not the CRD manifests
# (config/crd/bases/*.yaml) that this chart ships — those are full
# CustomResourceDefinition objects with an embedded OpenAPI schema, not
# standalone JSON Schema files kubeconform's -schema-location can address, so
# there's no CRD schema source to point it at here. This only validates the
# chart's built-in-kind manifests (Deployment, ClusterRole, RoleBinding,
# ValidatingAdmissionPolicy, ...) against upstream schemas and skips CRD
# instances entirely via -ignore-missing-schemas. CRD instance conformance
# (Dashboard/ServiceCard/etc. samples matching their own schema) is instead
# covered by internal/controller's server-side dry-run apply test against a
# real envtest API server (see samples_validation_test.go).
run = '''
helm template dist/chart | kubeconform -strict \
  -schema-location default \
  -ignore-missing-schemas
'''

[tasks.test-fuzz]
description = "Run fuzz tests on widget parsers (default 30s per target)"
run = '''
fuzztime="${FUZZ_TIME:-30s}"
go test ./internal/dashboard/... -fuzz=FuzzWidgetParsers -fuzztime="$fuzztime"
'''

[tasks.test-browser]
description = "Run browser smoke tests (requires headless Chrome)"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
run = '''
k8s_version="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | sed -E 's/.*v[0-9]+\.([0-9]+).*/1.\1/')}"
bin_dir="$PWD/bin"
mkdir -p "$bin_dir"
export KUBEBUILDER_ASSETS="$(setup-envtest use "$k8s_version" --bin-dir "$bin_dir" -p path)"
go test -tags=browser ./internal/dashboard/... -run TestBrowser -v -count=1
'''

[tasks.test-e2e]
description = "Run e2e tests against a Kind cluster (Kind must be installed)"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
run = '''
cluster="${KIND_CLUSTER}"
kind_args="--name $cluster"
if [ -n "${KIND_IMAGE:-}" ]; then
  kind_args="$kind_args --image $KIND_IMAGE"
fi
if ! kind get clusters | grep -qx "$cluster"; then
  echo "Creating Kind cluster '$cluster'..."
  kind create cluster $kind_args
fi
trap 'kind delete cluster --name "$cluster"' EXIT
KIND=kind KIND_CLUSTER="$cluster" go test -tags=e2e ./test/e2e/ -v -ginkgo.v
'''

##@ Build

[tasks.build]
description = "Build manager binary"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
# ./cmd (the package), not cmd/main.go (a single file) — `go build`/`go run`
# on one file excludes any sibling file in the same package (e.g.
# cmd/browser.go), silently building a binary missing whatever those files
# define.
run = "go build -o bin/manager ./cmd"

[tasks.run]
description = "Run a controller from your host"
depends = ["manifests", "generate", "templ-generate", "fmt", "vet"]
run = "go run ./cmd"

[tasks.preview]
description = "Serve the dashboard locally from config/samples, no cluster required"
depends = ["templ-generate"]
run = "go run ./cmd preview -f config/samples"

[tasks.build-dist]
description = "Cross-compile release binaries for every supported platform into dist-bin/, with sha256 checksums"
# VERSION/REVISION mirror docker-build's own fallbacks below; release.yaml
# sets both explicitly from the release-please tag. Needs a shebang: mise's
# default task shell is /bin/sh (dash on Ubuntu, which doesn't support
# `set -o pipefail`) — see tasks.helm-chart-refresh's comment for the same
# fix applied there first.
run = '''
#!/usr/bin/env bash
set -euo pipefail
version="${VERSION:-dev}"
revision="${REVISION:-$(git rev-parse --short HEAD)}"
outdir="$(pwd)/dist-bin"
rm -rf "$outdir"
mkdir -p "$outdir"

# Matches the platforms golang.org/dl and most Go-based CLI releases cover;
# add a target here (and to the dry-run matrix in test.yml) to extend it.
for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
  os="${target%/*}"
  arch="${target#*/}"
  ext=""
  [ "$os" = "windows" ] && ext=".exe"

  workdir="$(mktemp -d)"
  echo "Building ${os}/${arch}..."
  CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath \
    -ldflags "-X main.version=${version} -X main.commit=${revision}" \
    -o "${workdir}/kubepage-operator${ext}" ./cmd
  cp LICENSE README.md "$workdir/"

  archive="kubepage-operator_${version}_${os}_${arch}"
  if [ "$os" = "windows" ]; then
    (cd "$workdir" && zip -q -r "${outdir}/${archive}.zip" .)
  else
    tar -czf "${outdir}/${archive}.tar.gz" -C "$workdir" .
  fi
  rm -rf "$workdir"
done

(cd "$outdir" && sha256sum -- * > checksums.txt)
'''

[tasks.docker-build]
description = "Build docker image with the manager"
run = '''
$CONTAINER_TOOL build -t $IMG \
  --build-arg GO_VERSION="$GO_VERSION" \
  --build-arg VERSION="${VERSION:-dev}" \
  --build-arg REVISION="${REVISION:-$(git rev-parse --short HEAD)}" \
  .
'''

[tasks.docker-push]
description = "Push docker image with the manager"
run = "$CONTAINER_TOOL push $IMG"

[tasks.docker-buildx]
description = "Build and push multi-arch docker image for the manager"
run = '''
platforms="${PLATFORMS:-linux/arm64,linux/amd64,linux/s390x,linux/ppc64le}"
builder="kubepage-operator-builder"
sed -e '1 s/\(^FROM\)/FROM --platform=${BUILDPLATFORM}/; t' \
    -e ' 1,// s//FROM --platform=${BUILDPLATFORM}/' Dockerfile > Dockerfile.cross
trap 'rm -f Dockerfile.cross; $CONTAINER_TOOL buildx rm "$builder" 2>/dev/null || true' EXIT
$CONTAINER_TOOL buildx create --name "$builder" 2>/dev/null || true
$CONTAINER_TOOL buildx use "$builder"
$CONTAINER_TOOL buildx build --push --platform="$platforms" --tag "$IMG" \
  --build-arg GO_VERSION="$GO_VERSION" \
  --build-arg VERSION="${VERSION:-dev}" \
  --build-arg REVISION="${REVISION:-$(git rev-parse --short HEAD)}" \
  -f Dockerfile.cross .
'''

[tasks.build-installer]
description = "Generate a consolidated YAML with CRDs and deployment"
depends = ["manifests", "generate"]
run = '''
mkdir -p dist
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/default > dist/install.yaml
'''

[tasks.helm-chart-refresh]
description = "Regenerate dist/chart/ from config/ via kubebuilder's helm/v2-alpha plugin, preserving hand-tuned templates"
depends = ["build-installer"]
# Needs a shebang: this is the only task using `set -o pipefail`, and mise's
# default task shell is /bin/sh (dash on Ubuntu, which doesn't support
# pipefail — this only ever ran on macOS's bash-backed /bin/sh before it was
# wired into CI, see test.yml's generated-file drift check).
run = '''
#!/usr/bin/env bash
set -euo pipefail

# The helm/v2-alpha plugin always shells out to `make manifests`, `make
# generate`, and `make build-installer`, but this project has no Makefile —
# mise tasks are the only source of truth (see CLAUDE.md). Shim one in for
# the duration of this task that just delegates back to mise.
cat > Makefile <<'MAKEFILE'
manifests:
	mise run manifests
generate:
	mise run generate
build-installer:
	mise run build-installer
MAKEFILE

# config/admission's ValidatingAdmissionPolicy/Binding pair
# (credential-shaped-value) is a custom addition on top of the stock
# kubebuilder scaffold, hand-translated into a Helm template gated
# on .Values.admissionPolicies.enabled. Confirmed empirically (not just from
# --help text): the plugin does NOT leave these alone — it emits its own
# Binding-only, ungated templates under templates/extras/, each with an
# invalid `namespace:` field on a cluster-scoped kind, duplicating (and
# conflicting with) the hand-authored Policy+Binding pairs here. Back up and
# restore the real ones, then delete whatever the plugin dropped in
# templates/extras/ outright — it's never something to keep. If
# config/admission gains a new policy, add its chart template by hand
# (mirroring an existing one in dist/chart/templates/admission/) — this task
# can't create it for you.
preserved="dist/chart/templates/admission/credential-shaped-value-policy.yaml"
backup_dir="$(mktemp -d)"
trap 'rm -f Makefile; rm -rf "$backup_dir"' EXIT
for f in $preserved; do
  mkdir -p "$backup_dir/$(dirname "$f")"
  cp "$f" "$backup_dir/$f"
done

kubebuilder edit --plugins=helm/v2-alpha

echo "--- upstream drift in preserved templates (discarded below; review if kubebuilder/the plugin was upgraded) ---"
for f in $preserved; do
  diff -u "$backup_dir/$f" "$f" || true
  cp "$backup_dir/$f" "$f"
done

# See the comment above: these duplicate the admission Policy+Binding pairs
# with an invalid namespace field and no admissionPolicies.enabled gate.
rm -rf dist/chart/templates/extras

# The plugin also scaffolds a Test-Chart workflow assuming this project's
# stock kubebuilder Makefile targets (make docker-build, make install-helm,
# make helm-deploy, ...), none of which exist here — mise tasks are the only
# source of truth (see CLAUDE.md) — and chart linting/deploy is already
# covered by test-e2e.yml's own `helm lint dist/chart` step. Never keep it.
rm -f .github/workflows/test-chart.yml

helm lint dist/chart
echo "--- dist/chart diff ---"
git diff --stat -- dist/chart dist/install.yaml .github/workflows
'''

##@ Deployment

[tasks.install]
description = "Install CRDs into the K8s cluster from ~/.kube/config"
depends = ["manifests"]
run = '''
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then echo "$out" | kubectl apply -f -; else echo "No CRDs to install; skipping."; fi
'''

[tasks.uninstall]
description = "Uninstall CRDs from the K8s cluster from ~/.kube/config"
depends = ["manifests"]
run = '''
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then echo "$out" | kubectl delete --ignore-not-found=${ignore-not-found:-false} -f -; else echo "No CRDs to delete; skipping."; fi
'''

[tasks.deploy]
description = "Deploy controller to the K8s cluster from ~/.kube/config"
depends = ["manifests"]
run = '''
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/default | kubectl apply -f -
'''

[tasks.undeploy]
description = "Undeploy controller from the K8s cluster from ~/.kube/config"
run = "kustomize build config/default | kubectl delete --ignore-not-found=${ignore-not-found:-false} -f -"

##@ Helm Deployment

[tasks.helm-deploy]
description = "Deploy manager to the K8s cluster via Helm. Specify an image with IMG"
run = '''
helm upgrade --install "${HELM_RELEASE:-kubepage-operator}" "${HELM_CHART_DIR:-dist/chart}" \
  --namespace "${HELM_NAMESPACE:-kubepage-operator-system}" \
  --create-namespace \
  --set manager.image.repository="${IMG%:*}" \
  --set manager.image.tag="${IMG##*:}" \
  --wait --timeout 5m ${HELM_EXTRA_ARGS:-}
'''

[tasks.helm-uninstall]
description = "Uninstall the Helm release from the K8s cluster"
run = 'helm uninstall "${HELM_RELEASE:-kubepage-operator}" --namespace "${HELM_NAMESPACE:-kubepage-operator-system}"'

[tasks.helm-status]
description = "Show Helm release status"
run = 'helm status "${HELM_RELEASE:-kubepage-operator}" --namespace "${HELM_NAMESPACE:-kubepage-operator-system}"'

[tasks.helm-history]
description = "Show Helm release history"
run = 'helm history "${HELM_RELEASE:-kubepage-operator}" --namespace "${HELM_NAMESPACE:-kubepage-operator-system}"'

[tasks.helm-rollback]
description = "Rollback to previous Helm release"
run = 'helm rollback "${HELM_RELEASE:-kubepage-operator}" --namespace "${HELM_NAMESPACE:-kubepage-operator-system}"'
