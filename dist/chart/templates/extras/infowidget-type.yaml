apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-type" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-type" "context" $) }}
  validationActions:
  - Deny
