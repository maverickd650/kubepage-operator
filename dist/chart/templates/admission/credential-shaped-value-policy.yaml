{{- if .Values.admissionPolicies.enabled }}
# Warn-action ValidatingAdmissionPolicies flagging credential-shaped inline
# `value` (docs/security-review.md P2.5): a field named "token"/"password"/
# "apiKey"/etc. using `value` instead of `secretKeyRef` is very likely an
# accidental plaintext credential. validationActions: ["Warn"] rather than
# ["Deny"]: field naming is a heuristic, not a guarantee. Requires Kubernetes
# v1.30+ (ValidatingAdmissionPolicy is GA from 1.30).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "servicecard-credential-shaped-value" "context" $) }}
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["servicecards"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
      message: >-
        a widget secret field name looks credential-shaped (token/password/apiKey/
        secret/credential/privateKey) but uses an inline "value" instead of
        "secretKeyRef" — this stores the plaintext in the ServiceCard object
        itself (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef
        for real credentials; ignore this warning if the field name is a false
        positive (e.g. a genuinely non-secret option that happens to be named
        this way).
      reason: Invalid
    # Same check, one level deeper: the multi-card form (spec.services) nests
    # each card's own widgets under services[*].widgets[*] instead of
    # spec.widgets directly.
    - expression: >-
        !has(object.spec.services) || object.spec.services.all(e,
          !has(e.widgets) || e.widgets.all(w,
            !has(w.secrets) || w.secrets.all(k,
              !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)')))))
      message: >-
        a widget secret field name under services[].widgets[] looks
        credential-shaped (token/password/apiKey/secret/credential/privateKey)
        but uses an inline "value" instead of "secretKeyRef" — this stores the
        plaintext in the ServiceCard object itself (etcd, any GitOps repo,
        `kubectl get -o yaml`). Prefer secretKeyRef for real credentials;
        ignore this warning if the field name is a false positive (e.g. a
        genuinely non-secret option that happens to be named this way).
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "servicecard-credential-shaped-value" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "servicecard-credential-shaped-value" "context" $) }}
  validationActions: ["Warn"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-credential-shaped-value" "context" $) }}
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        !has(object.spec.secrets) || object.spec.secrets.all(k,
          !(has(object.spec.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)')))
      message: >-
        a secret field name looks credential-shaped (token/password/apiKey/secret/
        credential/privateKey) but uses an inline "value" instead of
        "secretKeyRef" — this stores the plaintext in the InfoWidget object itself
        (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef for
        real credentials; ignore this warning if the field name is a false
        positive (e.g. a genuinely non-secret option that happens to be named
        this way).
      reason: Invalid
    # Same check, one level deeper: the multi-widget form (spec.widgets) nests
    # each entry's own secrets under widgets[*].secrets instead of
    # spec.secrets directly.
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
      message: >-
        a secret field name under widgets[].secrets looks credential-shaped
        (token/password/apiKey/secret/credential/privateKey) but uses an
        inline "value" instead of "secretKeyRef" — this stores the plaintext
        in the InfoWidget object itself (etcd, any GitOps repo, `kubectl get
        -o yaml`). Prefer secretKeyRef for real credentials; ignore this
        warning if the field name is a false positive (e.g. a genuinely
        non-secret option that happens to be named this way).
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-credential-shaped-value" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-credential-shaped-value" "context" $) }}
  validationActions: ["Warn"]
{{- end }}
