{{- if .Values.admissionPolicies.enabled }}
# ValidatingAdmissionPolicies rejecting unknown widget types at apply time, so
# a typo'd/unsupported type fails `kubectl apply` rather than surfacing as a
# card error at poll time. The allowed lists mirror the widget types registered
# in internal/dashboard; keep them in sync. Requires Kubernetes v1.30+.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-widget-type" "context" $) }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceentries"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          w.type in ['plex', 'stash', 'paperlessngx', 'grafana', 'prometheus',
            'prometheusmetric', 'unifi', 'truenas', 'cloudflared', 'linkwarden',
            'homeassistant', 'mealie'])
      message: "each ServiceEntry widget type must be a supported service widget (plex, stash, paperlessngx, grafana, prometheus, prometheusmetric, unifi, truenas, cloudflared, linkwarden, homeassistant, mealie)"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-widget-type" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-widget-type" "context" $) }}
  validationActions: ["Deny"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-type" "context" $) }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        object.spec.type in ['greeting', 'datetime', 'openmeteo', 'kubemetrics']
      message: "InfoWidget type must be one of greeting, datetime, openmeteo, kubemetrics"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-type" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-type" "context" $) }}
  validationActions: ["Deny"]
{{- end }}
