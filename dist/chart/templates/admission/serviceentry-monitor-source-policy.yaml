{{- if .Values.admissionPolicies.enabled }}
# ValidatingAdmissionPolicy enforcing the ServiceEntry monitor-source
# invariant: ping, siteMonitor, and podSelector are three independent ways
# to compute the same up/down status badge, so at most one may be set.
# Requires Kubernetes v1.30+ (ValidatingAdmissionPolicy is GA from 1.30).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-monitor-source" "context" $) }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceentries"]
  validations:
    - expression: >-
        (has(object.spec.ping) ? 1 : 0) +
        (has(object.spec.siteMonitor) ? 1 : 0) +
        (has(object.spec.podSelector) ? 1 : 0) <= 1
      message: "a ServiceEntry may set at most one of ping, siteMonitor, or podSelector"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-monitor-source" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-monitor-source" "context" $) }}
  validationActions: ["Deny"]
{{- end }}
