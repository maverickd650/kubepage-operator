{{- if .Values.admissionPolicies.enabled }}
# ValidatingAdmissionPolicies enforcing the SecretValueSource invariant: every
# secret-bearing field must set exactly one of value/secretKeyRef. Requires
# Kubernetes v1.30+ (ValidatingAdmissionPolicy is GA from 1.30).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-secret-source" "context" $) }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceentries"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            (has(w.secrets[k].value) ? 1 : 0) + (has(w.secrets[k].secretKeyRef) ? 1 : 0) == 1))
      message: "each ServiceEntry widget secret must set exactly one of value or secretKeyRef"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-secret-source" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "serviceentry-secret-source" "context" $) }}
  validationActions: ["Deny"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-secret-source" "context" $) }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        !has(object.spec.secrets) || object.spec.secrets.all(k,
          (has(object.spec.secrets[k].value) ? 1 : 0) + (has(object.spec.secrets[k].secretKeyRef) ? 1 : 0) == 1)
      message: "each InfoWidget secret must set exactly one of value or secretKeyRef"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-secret-source" "context" $) }}
spec:
  policyName: {{ include "kubepage-operator.resourceName" (dict "suffix" "infowidget-secret-source" "context" $) }}
  validationActions: ["Deny"]
{{- end }}
