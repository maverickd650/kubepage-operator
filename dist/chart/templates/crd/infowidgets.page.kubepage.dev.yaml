{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: infowidgets.page.kubepage.dev
spec:
  group: page.kubepage.dev
  names:
    kind: InfoWidget
    listKind: InfoWidgetList
    plural: infowidgets
    shortNames:
    - piw
    singular: infowidget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Ready
      type: string
    - jsonPath: .spec.dashboardRef.name
      name: Dashboard
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InfoWidget is the Schema for the infowidgets API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of InfoWidget
            properties:
              align:
                description: |-
                  align places this widget in the header strip's left or right slot,
                  matching homepage's right-aligned info widgets. Unset defaults to
                  "Left" for "greeting"/"datetime" and "Right" for every other type
                  (homepage's own default layout: greeting/clock on the left, live
                  stats on the right).
                enum:
                - Left
                - Right
                type: string
              caCert:
                description: |-
                  caCert optionally supplies a PEM-encoded CA certificate (or bundle)
                  used, in addition to the system trust store, to verify this widget's
                  upstream. See ServiceWidget.CACert's doc comment for the full
                  rationale.
                properties:
                  secretKeyRef:
                    description: secretKeyRef selects a key of a Secret in the same
                      namespace.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  value:
                    description: |-
                      value is a literal value. Avoid this for real credentials; prefer
                      SecretKeyRef so the value isn't stored in the CR.
                    maxLength: 4096
                    minLength: 1
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of value or secretKeyRef must be set
                  rule: '(has(self.value) ? 1 : 0) + (has(self.secretKeyRef) ? 1 :
                    0) == 1'
              dashboardRef:
                description: dashboardRef names the Dashboard this InfoWidget belongs
                  to.
                properties:
                  name:
                    description: name of the Dashboard this object belongs to.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              icon:
                description: |-
                  icon shown to the left of this widget's value(s) in the header strip,
                  matching homepage's Resource component. Resolved the same way as
                  ServiceCard/Bookmark Icon: a full URL passes through unchanged,
                  anything else is treated as a dashboard-icons slug. Ignored by the
                  "greeting" and "datetime" widget types, which homepage renders without
                  an icon.
                maxLength: 256
                minLength: 1
                type: string
              options:
                description: |-
                  options holds every widget-type-specific field; unrecognized keys are
                  silently ignored rather than rejected (see internal/dashboard's
                  per-widget source for the authoritative shape). Known keys by type:
                    - greeting: text (the message shown)
                    - datetime: format (a JSON-encoded Intl.DateTimeFormat options
                      object, e.g. {"dateStyle":"short","timeStyle":"short"}; defaults
                      to medium/medium)
                    - openmeteo, openweathermap: latitude, longitude (both required),
                      units ("metric"/"imperial"), label
                    - kubemetrics: cpuLabel, memoryLabel
                    - glances: apiVersion ("3" or "4"; defaults to "4")
                  logo and longhorn take no options.
                x-kubernetes-preserve-unknown-fields: true
              order:
                description: |-
                  order controls rendering position: widgets are sorted by Order (nil
                  sorts last), ties broken by the InfoWidget object's name, since CRDs
                  have no inherent ordering of their own.
                format: int32
                type: integer
              pollIntervalSeconds:
                description: |-
                  pollIntervalSeconds overrides the dashboard's global --poll-interval
                  for this widget only; see ServiceWidget.PollIntervalSeconds. Ignored by
                  "datetime"/"greeting"/"logo", which aren't polled at all.
                format: int32
                minimum: 1
                type: integer
              secrets:
                additionalProperties:
                  description: |-
                    SecretValueSource is an inline value or a reference to a key in a Secret,
                    used for any config field that may hold a credential (e.g. a widget API
                    key). Exactly one of Value or SecretKeyRef must be set; this is enforced by
                    the CRD schema's CEL rule below, so neither a secret that sets both nor one
                    that sets neither reaches the dashboard, which resolves whichever is set
                    in-process at poll time.
                  properties:
                    secretKeyRef:
                      description: secretKeyRef selects a key of a Secret in the same
                        namespace.
                      properties:
                        key:
                          description: The key of the secret to select from.  Must
                            be a valid secret key.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the Secret or its key must
                            be defined
                          type: boolean
                      required:
                      - key
                      type: object
                      x-kubernetes-map-type: atomic
                    value:
                      description: |-
                        value is a literal value. Avoid this for real credentials; prefer
                        SecretKeyRef so the value isn't stored in the CR.
                      maxLength: 4096
                      minLength: 1
                      type: string
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of value or secretKeyRef must be set
                    rule: '(has(self.value) ? 1 : 0) + (has(self.secretKeyRef) ? 1
                      : 0) == 1'
                description: |-
                  secrets are secret-bearing option fields. Merged into Options under the
                  same field names once a renderer for this CRD exists.

                  RBAC note: the same caveat as ServiceCard's widgets.secrets applies
                  here — see ServiceWidget.Secrets' doc comment. Anyone who can create
                  an InfoWidget in this namespace can read any Secret in it by
                  referencing it via secretKeyRef and pointing this widget's options at
                  a server they control.
                minProperties: 1
                type: object
              type:
                description: |-
                  type is the widget type: "greeting"/"datetime" render statically
                  (internal/dashboard/server.go); the rest are polled header widgets
                  (openmeteo, openweathermap, glances, longhorn) or cluster-sourced
                  (kubemetrics). internal/controller/widget_type_policy_test.go asserts
                  this enum stays in sync with the internal/dashboard widget registry.
                enum:
                - greeting
                - datetime
                - logo
                - openmeteo
                - kubemetrics
                - glances
                - longhorn
                - openweathermap
                type: string
            required:
            - dashboardRef
            - type
            type: object
          status:
            description: status defines the observed state of InfoWidget
            minProperties: 1
            properties:
              conditions:
                description: conditions represent the current state of the InfoWidget
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
