{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: servicecards.page.kubepage.dev
spec:
  group: page.kubepage.dev
  names:
    kind: ServiceCard
    listKind: ServiceCardList
    plural: servicecards
    shortNames:
    - pcard
    singular: servicecard
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Ready
      type: string
    - jsonPath: .spec.dashboardRef.name
      name: Dashboard
      type: string
    - jsonPath: .spec.group
      name: Group
      type: string
    - jsonPath: .status.entries
      name: Entries
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ServiceCard is the Schema for the servicecards API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ServiceCard
            properties:
              dashboardRef:
                description: dashboardRef names the Dashboard this ServiceCard belongs
                  to.
                properties:
                  name:
                    description: name of the Dashboard this object belongs to.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              description:
                description: description overrides the default description shown on
                  the card.
                maxLength: 1024
                minLength: 1
                type: string
              errorDisplay:
                description: |-
                  errorDisplay controls whether a widget's error text is shown on the
                  card (e.g. set "Hidden" for a service that is expected to be
                  intermittently unreachable). Defaults to "Shown".
                enum:
                - Shown
                - Hidden
                type: string
              group:
                description: |-
                  group is the name of the (top-level) group this entry belongs to (the
                  single-card form), or the default group for any Services entry that
                  doesn't set its own group (the multi-card form).
                maxLength: 256
                minLength: 1
                type: string
              href:
                description: href makes the card's title a link to the service.
                maxLength: 2048
                minLength: 1
                pattern: ^https?://
                type: string
              icon:
                description: |-
                  icon resolves as a dashboard-icons slug, or passes through as-is if
                  it's already a full URL.
                maxLength: 256
                minLength: 1
                type: string
              name:
                description: |-
                  name is the service's display name (the card title). Set only for the
                  single-card form; mutually exclusive with Services.
                maxLength: 256
                minLength: 1
                type: string
              order:
                description: |-
                  order controls rendering position: groups and entries are sorted by
                  Order (nil sorts last), ties broken by Name, since CRDs have no
                  inherent ordering but the dashboard's groups/entries are displayed in a
                  fixed order.
                format: int32
                type: integer
              ping:
                description: |-
                  ping is a URL probed over HTTP for reachability and latency, shown as
                  an up/down status on the card. (Raw ICMP is not used, so a pod needs
                  no elevated capabilities.)
                maxLength: 2048
                minLength: 1
                pattern: ^https?://
                type: string
              podSelector:
                description: |-
                  podSelector selects pods in this ServiceCard's namespace whose
                  readiness determines this service's up/down status — a
                  Kubernetes-native alternative to Ping/SiteMonitor for services that
                  run as pods in this cluster, needing no externally reachable URL.
                  With multiple matches, any Ready pod renders "Up"; the card shows
                  "<ready>/<total> ready" in place of Ping/SiteMonitor's latency.
                  Mutually exclusive with Ping and SiteMonitor (enforced by this spec's
                  CEL validation rule).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              services:
                description: |-
                  services defines one entry per service card, for a ServiceCard that
                  groups multiple cards (a whole group, or a whole dashboard) into one
                  object instead of one ServiceCard per card. group is optional on each
                  entry: an entry without its own group falls back to spec.group as a
                  shared default. Mutually exclusive with the inline single-card fields
                  above (name, href, target, icon, description, showStats, errorDisplay,
                  ping, siteMonitor, podSelector, statusStyle, widgets, order).
                items:
                  description: |-
                    ServiceEntry is one service card's configuration: display fields, monitor
                    source, and widgets. ServiceCardSpec embeds one ServiceEntry inline for
                    the single-card form (one ServiceCard object per card, the original wire
                    format), and holds a list of them in Services for the multi-card form (one
                    ServiceCard object per group, or per whole dashboard).

                    Nested groups (a group inside another group) are not supported in this
                    version of the operator; Group always names a top-level group.
                  properties:
                    description:
                      description: description overrides the default description shown
                        on the card.
                      maxLength: 1024
                      minLength: 1
                      type: string
                    errorDisplay:
                      description: |-
                        errorDisplay controls whether a widget's error text is shown on the
                        card (e.g. set "Hidden" for a service that is expected to be
                        intermittently unreachable). Defaults to "Shown".
                      enum:
                      - Shown
                      - Hidden
                      type: string
                    group:
                      description: |-
                        group is the name of the (top-level) group this entry belongs to.
                        Entries sharing a Group are rendered together. In the multi-card form
                        (ServiceCardSpec.Services), an entry that omits group falls back to
                        ServiceCardSpec.Group as a shared default (see ServiceCardSpec.Entries).
                      maxLength: 256
                      minLength: 1
                      type: string
                    href:
                      description: href makes the card's title a link to the service.
                      maxLength: 2048
                      minLength: 1
                      pattern: ^https?://
                      type: string
                    icon:
                      description: |-
                        icon resolves as a dashboard-icons slug, or passes through as-is if
                        it's already a full URL.
                      maxLength: 256
                      minLength: 1
                      type: string
                    name:
                      description: name is the service's display name (the card title).
                      maxLength: 256
                      minLength: 1
                      type: string
                    order:
                      description: |-
                        order controls rendering position: groups and entries are sorted by
                        Order (nil sorts last), ties broken by Name, since CRDs have no
                        inherent ordering but the dashboard's groups/entries are displayed in a
                        fixed order.
                      format: int32
                      type: integer
                    ping:
                      description: |-
                        ping is a URL probed over HTTP for reachability and latency, shown as
                        an up/down status on the card. (Raw ICMP is not used, so a pod needs
                        no elevated capabilities.)
                      maxLength: 2048
                      minLength: 1
                      pattern: ^https?://
                      type: string
                    podSelector:
                      description: |-
                        podSelector selects pods in this ServiceCard's namespace whose
                        readiness determines this service's up/down status — a
                        Kubernetes-native alternative to Ping/SiteMonitor for services that
                        run as pods in this cluster, needing no externally reachable URL.
                        With multiple matches, any Ready pod renders "Up"; the card shows
                        "<ready>/<total> ready" in place of Ping/SiteMonitor's latency.
                        Mutually exclusive with Ping and SiteMonitor (enforced by this type's
                        CEL validation rule).
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    showStats:
                      description: |-
                        showStats controls whether the polled widget fields are displayed on
