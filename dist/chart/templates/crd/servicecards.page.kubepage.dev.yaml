                    target:
                      description: |-
                        target overrides the DashboardStyle's default link target for this
                        card's Href ("_blank" opens a new tab, "_self" the same tab).
                      enum:
                      - _blank
                      - _self
                      type: string
                    widgets:
                      description: |-
