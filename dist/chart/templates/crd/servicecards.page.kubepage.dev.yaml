                            - grafana
                            - prometheus
                            - prometheusmetric
                            - unifi
                            - truenas
                            - cloudflared
                            - linkwarden
                            - homeassistant
                            - mealie
                            - customapi
                            - iframe
                            - sonarr
                            - radarr
                            - jellyfin
                            - jellyseerr
