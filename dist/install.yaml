                - gray
                - zinc
                - neutral
                - stone
                - amber
                - yellow
                - lime
                - green
                - emerald
                - teal
                - cyan
                - sky
                - blue
                - indigo
                - violet
                - purple
                - fuchsia
                - pink
                - rose
                - red
