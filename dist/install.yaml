  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubepage-operator
    control-plane: controller-manager
  name: kubepage-operator-controller-manager
  namespace: kubepage-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubepage-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: kubepage-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kubepage-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-infowidget-secret-source
  namespace: kubepage-operator-system
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - infowidgets
  validations:
  - expression: |-
      !has(object.spec.secrets) || object.spec.secrets.all(k,

        (has(object.spec.secrets[k].value) ? 1 : 0) + (has(object.spec.secrets[k].secretKeyRef) ? 1 : 0) == 1)
    message: each InfoWidget secret must set exactly one of value or secretKeyRef
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-infowidget-type
  namespace: kubepage-operator-system
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - infowidgets
  validations:
  - expression: object.spec.type in ['greeting', 'datetime', 'openmeteo', 'kubemetrics']
    message: InfoWidget type must be one of greeting, datetime, openmeteo, kubemetrics
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-serviceentry-monitor-source
  namespace: kubepage-operator-system
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - serviceentries
  validations:
  - expression: '(has(object.spec.ping) ? 1 : 0) + (has(object.spec.siteMonitor) ?
      1 : 0) + (has(object.spec.podSelector) ? 1 : 0) <= 1'
    message: a ServiceEntry may set at most one of ping, siteMonitor, or podSelector
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-serviceentry-secret-source
  namespace: kubepage-operator-system
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - serviceentries
  validations:
  - expression: |-
      !has(object.spec.widgets) || object.spec.widgets.all(w,

        !has(w.secrets) || w.secrets.all(k,
          (has(w.secrets[k].value) ? 1 : 0) + (has(w.secrets[k].secretKeyRef) ? 1 : 0) == 1))
    message: each ServiceEntry widget secret must set exactly one of value or secretKeyRef
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-serviceentry-widget-type
  namespace: kubepage-operator-system
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - serviceentries
  validations:
  - expression: |-
      !has(object.spec.widgets) || object.spec.widgets.all(w,

        w.type in ['plex', 'stash', 'paperlessngx', 'grafana', 'prometheus',
          'prometheusmetric', 'unifi', 'truenas', 'cloudflared', 'linkwarden',
          'homeassistant', 'mealie'])
    message: each ServiceEntry widget type must be a supported service widget (plex,
      stash, paperlessngx, grafana, prometheus, prometheusmetric, unifi, truenas,
      cloudflared, linkwarden, homeassistant, mealie)
    reason: Invalid
---
