                    minLength: 1
                    type: string
                  opacity:
                    description: opacity blends the background image with the background
                      color, 0-100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  saturate:
                    description: |-
                      saturate is a backdrop saturate percentage (Tailwind backdrop-saturate
                      scale, e.g. 0, 50, 100).
                    format: int32
                    type: integer
                type: object
