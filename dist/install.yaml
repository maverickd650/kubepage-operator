  name: kubepage-operator-controller-manager
  namespace: kubepage-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepage-operator-metrics-auth-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepage-operator-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: kubepage-operator-controller-manager
  namespace: kubepage-operator-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubepage-operator
    control-plane: controller-manager
  name: kubepage-operator-controller-manager-metrics-service
  namespace: kubepage-operator-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: kubepage-operator
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubepage-operator
    control-plane: controller-manager
  name: kubepage-operator-controller-manager
  namespace: kubepage-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubepage-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: kubepage-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kubepage-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-dashboard-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - dashboards
  validations:
  - expression: |-
      !has(object.spec.widgetDefaults) || object.spec.widgetDefaults.all(t,

        !has(object.spec.widgetDefaults[t].secrets) || object.spec.widgetDefaults[t].secrets.all(k,
          !(has(object.spec.widgetDefaults[t].secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
    message: a widgetDefaults secret field name looks credential-shaped (token/password/apiKey/
      secret/credential/privateKey) but uses an inline "value" instead of "secretKeyRef"
      — this stores the plaintext in the Dashboard object itself (etcd, any GitOps
      repo, `kubectl get -o yaml`). Prefer secretKeyRef for real credentials; ignore
      this warning if the field name is a false positive (e.g. a genuinely non-secret
      option that happens to be named this way).
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-infowidget-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - infowidgets
  validations:
  - expression: |-
      !has(object.spec.widgets) || object.spec.widgets.all(w,

        !has(w.secrets) || w.secrets.all(k,
          !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
    message: a secret field name under widgets[].secrets looks credential-shaped (token/password/apiKey/secret/credential/privateKey)
      but uses an inline "value" instead of "secretKeyRef" — this stores the plaintext
      in the InfoWidget object itself (etcd, any GitOps repo, `kubectl get -o yaml`).
      Prefer secretKeyRef for real credentials; ignore this warning if the field name
      is a false positive (e.g. a genuinely non-secret option that happens to be named
      this way).
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kubepage-operator-servicecard-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
    - apiGroups:
      - page.kubepage.dev
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - servicecards
  validations:
  - expression: |-
      !has(object.spec.services) || object.spec.services.all(e,

        !has(e.widgets) || e.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)')))))
    message: a widget secret field name under services[].widgets[] looks credential-shaped
      (token/password/apiKey/secret/credential/privateKey) but uses an inline "value"
      instead of "secretKeyRef" — this stores the plaintext in the ServiceCard object
      itself (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef for
      real credentials; ignore this warning if the field name is a false positive
      (e.g. a genuinely non-secret option that happens to be named this way).
    reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kubepage-operator-dashboard-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  policyName: kubepage-operator-dashboard-credential-shaped-value
  validationActions:
  - Warn
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kubepage-operator-infowidget-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  policyName: kubepage-operator-infowidget-credential-shaped-value
  validationActions:
  - Warn
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kubepage-operator-servicecard-credential-shaped-value
  namespace: kubepage-operator-system
spec:
  policyName: kubepage-operator-servicecard-credential-shaped-value
  validationActions:
  - Warn
