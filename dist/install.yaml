                                    properties:
                                      caseSensitive:
                                        description: |-
                                          caseSensitive makes a string operator's comparison case-sensitive.
                                          Defaults to "CaseInsensitive"; ignored by numeric operators.
                                        enum:
                                        - CaseSensitive
                                        - CaseInsensitive
                                        type: string
                                      level:
                                        description: level this rule sets when it
                                          matches.
                                        enum:
                                        - good
                                        - warn
                                        - danger
                                        type: string
                                      negate:
                                        description: |-
                                          negate inverts the rule's match ("Negate") instead of the default
                                          ("Match").
                                        enum:
                                        - Match
                                        - Negate
                                        type: string
                                      value:
                                        description: |-
                                          value is the rule's comparison value: a number for a numeric
                                          operator, text for a string operator. For "between"/"outside" this is
                                          the lower bound.
                                        maxLength: 256
                                        minLength: 1
                                        type: string
                                      value2:
                                        description: |-
                                          value2 is the upper bound for the "between"/"outside" operators;
                                          ignored by every other operator.
                                        maxLength: 256
                                        minLength: 1
                                        type: string
                                      when:
                                        description: |-
                                          when is the comparison operator. Numeric fields use gt/gte/lt/lte/eq/
                                          ne/between/outside (Value/Value2 parsed as numbers); string fields use
                                          equals/includes/startsWith/endsWith/regex (Value compared as text).
                                        enum:
                                        - gt
                                        - gte
                                        - lt
                                        - lte
                                        - eq
                                        - ne
                                        - between
                                        - outside
                                        - equals
                                        - includes
                                        - startsWith
                                        - endsWith
                                        - regex
                                        type: string
                                    required:
                                    - level
                                    - value
                                    - when
                                    type: object
                                    x-kubernetes-validations:
                                    - message: value2 is required when when is "between"
                                        or "outside"
                                      rule: '!(self.when in [''between'',''outside''])
                                        || has(self.value2)'
                                  maxItems: 32
                                  minItems: 1
                                  type: array
                                  x-kubernetes-list-type: atomic
                                scope:
                                  description: |-
                                    scope controls how much of the stat chip a matching rule highlights:
                                    "WholeField" (the default) highlights the whole chip, label included;
                                    "ValueOnly" highlights just the value.
                                  enum:
                                  - WholeField
                                  - ValueOnly
                                  type: string
                              required:
                              - rules
                              type: object
                            description: |-
                              highlight tints a field's stat chip by severity (good/warn/danger),
                              keyed by the field's label. See FieldHighlight.
                            minProperties: 1
                            type: object
                          pollIntervalSeconds:
                            description: |-
                              pollIntervalSeconds overrides the dashboard's global --poll-interval
                              for this widget only, letting a slow upstream (e.g. weather) poll less
                              often than a fast one (e.g. Prometheus) without slowing every other
                              widget down to match. Unset polls at the global interval every cycle.
                              Floor-clamped to the global interval: a value smaller than it would
                              have no effect anyway, since the poller only ever runs once per cycle.
                            format: int32
                            minimum: 1
                            type: integer
                          secrets:
                            additionalProperties:
                              description: |-
                                SecretValueSource is an inline value or a reference to a key in a Secret,
                                used for any config field that may hold a credential (e.g. a widget API
                                key). Exactly one of Value or SecretKeyRef must be set; this is enforced by
                                the CRD schema's CEL rule below, so neither a secret that sets both nor one
                                that sets neither reaches the dashboard, which resolves whichever is set
                                in-process at poll time.
                              properties:
                                secretKeyRef:
                                  description: secretKeyRef selects a key of a Secret
                                    in the same namespace.
                                  properties:
                                    key:
                                      description: The key of the secret to select
                                        from.  Must be a valid secret key.
                                      type: string
                                    name:
                                      default: ""
                                      description: |-
                                        Name of the referent.
                                        This field is effectively required, but due to backwards compatibility is
                                        allowed to be empty. Instances of this type with an empty value here are
                                        almost certainly wrong.
                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                      type: string
                                    optional:
                                      description: Specify whether the Secret or its
                                        key must be defined
                                      type: boolean
                                  required:
                                  - key
                                  type: object
                                  x-kubernetes-map-type: atomic
                                value:
                                  description: |-
                                    value is a literal value. Avoid this for real credentials; prefer
                                    SecretKeyRef so the value isn't stored in the CR.
                                  maxLength: 4096
                                  minLength: 1
                                  type: string
                              type: object
                              x-kubernetes-validations:
                              - message: exactly one of value or secretKeyRef must
                                  be set
                                rule: '(has(self.value) ? 1 : 0) + (has(self.secretKeyRef)
                                  ? 1 : 0) == 1'
                            description: |-
                              secrets are secret-bearing widget fields (commonly "token", sometimes
                              "username"/"password" depending on widget type), resolved directly by
                              the dashboard backend rather than stored inline.

                              RBAC note: creating a ServiceCard that references a secretKeyRef
                              grants no RBAC to the creator, but it does let the dashboard pod read
                              that Secret and send its plaintext value to this widget's own url —
                              so anyone who can create a ServiceCard in this namespace can read any
                              Secret in it by pointing url at a server they control, without ever
                              needing "get secrets" themselves. Only grant ServiceCard create
                              access to principals you'd also trust with every Secret in the
                              namespace.
                            minProperties: 1
                            type: object
                          type:
                            description: |-
                              type is the widget type. Must be one of the service widget types
                              registered in internal/dashboard (each widget's init() Register call);
                              internal/controller/widget_type_policy_test.go asserts this enum stays
                              in sync with the registry.
                            enum:
                            - plex
                            - stash
                            - paperlessngx
                            - grafana
                            - prometheus
                            - prometheusmetric
                            - unifi
                            - truenas
                            - cloudflared
                            - linkwarden
                            - homeassistant
                            - mealie
                            - customapi
                            - iframe
                            - sonarr
                            - radarr
                            - jellyfin
                            - jellyseerr
                            - immich
                            - adguard
                            - pihole
                            - uptime-kuma
                            - portainer
                            - argocd
                            - gitea
                            - tautulli
                            - proxmox
                            - nextcloud
                            - opnsense
                            - netdata
                            - speedtest
                            - gatus
                            type: string
                          url:
                            description: url is the base URL the widget talks to.
                            maxLength: 2048
                            minLength: 1
                            pattern: ^https?://
                            type: string
                        required:
                        - type
                        type: object
                      maxItems: 16
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: atomic
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: at most one of ping, siteMonitor, or podSelector may
                      be set
                    rule: '(has(self.ping) ? 1 : 0) + (has(self.siteMonitor) ? 1 :
                      0) + (has(self.podSelector) ? 1 : 0) <= 1'
                maxItems: 64
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
            required:
            - dashboardRef
            - services
            type: object
            x-kubernetes-validations:
            - message: 'every services entry must resolve a group: set spec.group
                as a default, or set group on every entry'
              rule: has(self.group) || self.services.all(s, has(s.group))
          status:
            description: status defines the observed state of ServiceCard
            minProperties: 1
            properties:
              conditions:
                description: conditions represent the current state of the ServiceCard
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              entries:
                description: entries is the number of entries this object defines
                  (len(spec.services)).
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
