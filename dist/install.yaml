apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: configurations.page.kubepage.dev
spec:
  group: page.kubepage.dev
  names:
    kind: Configuration
    listKind: ConfigurationList
    plural: configurations
    shortNames:
    - pcfg
    singular: configuration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Ready
      type: string
    - jsonPath: .spec.instanceRef.name
      name: Instance
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Configuration is the Schema for the configurations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Configuration
            properties:
              background:
                description: background image and filters, used instead of the solid
                  theme color.
                minProperties: 1
                properties:
                  blur:
                    description: |-
                      blur is a backdrop blur, a Tailwind backdrop-blur size keyword (e.g.
                      "sm", "md", "xl", ""). An explicit "" is equivalent to leaving it
                      unset (the default 8px blur).
                    maxLength: 8
                    minLength: 0
                    type: string
                  brightness:
                    description: |-
                      brightness is a backdrop brightness percentage (Tailwind
                      backdrop-brightness scale, e.g. 0, 50, 75).
                    format: int32
                    type: integer
                  image:
                    description: |-
                      image is the full URL or path (relative to /app/public) to the
                      background image.
                    maxLength: 2048
                    minLength: 1
                    type: string
                  opacity:
                    description: opacity blends the background image with the background
                      color, 0-100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  saturate:
                    description: |-
                      saturate is a backdrop saturate percentage (Tailwind backdrop-saturate
                      scale, e.g. 0, 50, 100).
                    format: int32
                    type: integer
                type: object
              bookmarksStyle:
                description: |-
                  bookmarksStyle renders every bookmark card icon-only (no name or
                  description), matching homepage's `bookmarksStyle: icons`.
                enum:
                - icons
                type: string
              cardBlur:
                description: |-
                  cardBlur applies a backdrop blur to cards, a Tailwind backdrop-blur
                  size keyword (e.g. "sm", "md", "xl", ""). An explicit "" is equivalent
                  to leaving it unset (the default 8px blur). Most visible over a
                  background image.
                maxLength: 8
                minLength: 0
                type: string
              color:
                description: color is the fixed color palette, disabling the palette
                  switcher.
                enum:
                - slate
                - gray
                - zinc
                - neutral
                - stone
                - amber
                - yellow
                - lime
                - green
                - emerald
                - teal
                - cyan
                - sky
                - blue
                - indigo
                - violet
                - purple
                - fuchsia
                - pink
                - rose
                - red
                - white
                type: string
              customCSS:
                description: |-
                  customCSS is raw CSS injected into the dashboard's page in a second
                  <style> block appended after the built-in stylesheet, so its rules
                  can override it. Trusted, operator-supplied content — the same trust
                  level as every other Configuration field (e.g. Background.Image).
                maxLength: 10000
                minLength: 1
                type: string
              description:
                description: |-
                  description is shown as a header subtitle and the page's meta
                  description.
                maxLength: 1024
                minLength: 1
                type: string
              disableCollapse:
                description: |-
                  disableCollapse disables the collapsible expand/collapse control on
                  service and bookmark group headers. Collapsing is enabled by default.
                enum:
                - Enabled
                - Disabled
                type: string
              disableIndexing:
                description: |-
                  disableIndexing asks search engines not to index the dashboard:
                  disallows all crawlers in robots.txt and adds a noindex meta tag.
                enum:
                - Indexed
                - NoIndex
                type: string
              favicon:
                description: favicon is a URL to the dashboard's favicon.
                maxLength: 2048
                minLength: 1
                pattern: ^https?://
                type: string
              fullWidth:
                description: |-
                  fullWidth uses the entire window width instead of a centered,
                  constrained layout.
                enum:
                - Full
                - Contained
                type: string
              groupsInitiallyCollapsed:
                description: |-
                  groupsInitiallyCollapsed collapses every group by default on first
                  load. A LayoutGroupSpec's own InitiallyCollapsed overrides this per
                  group. Ignored when DisableCollapse is set.
                enum:
                - Collapsed
                - Expanded
                type: string
              headerStyle:
                description: headerStyle for service/bookmark group headers.
                enum:
                - underlined
                - boxed
                - clean
                - boxedWidgets
                type: string
              instanceRef:
                description: instanceRef names the Instance this Configuration applies
                  to.
                properties:
                  name:
                    description: name of the Instance this object belongs to.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              language:
                description: language is the UI language, e.g. "en", "fr", "de".
                maxLength: 16
                minLength: 1
                type: string
              layout:
                description: |-
                  layout arranges ServiceEntry Groups into tabs, mirroring homepage's
                  settings.yaml `layout:` map (group -> style) with tabs added on top.
                  Omitted/empty renders every group flat with no tab UI, as before.
                items:
                  description: |-
                    LayoutTabSpec is one tab: a named, ordered set of Groups shown together.
                    Groups not referenced by any tab still render, appended to an implicit
                    trailing "Other" tab; a Group referenced by more than one tab is shown
                    under the first tab that lists it.
                  properties:
                    groups:
                      description: groups lists, in display order, the Groups shown
                        under this tab.
                      items:
                        description: |-
                          LayoutGroupSpec configures one Group's placement and style within a
                          LayoutTabSpec, mirroring homepage's settings.yaml `layout:` per-group
                          style keys (style/columns/icon).
                          See https://gethomepage.dev/configs/settings/#layout
                        properties:
                          columns:
                            description: |-
                              columns is the number of card columns to render this group in,
                              overriding the dashboard's default auto-fill grid.
                            format: int32
                            maximum: 6
                            minimum: 1
                            type: integer
                          header:
                            description: |-
                              header renders this group's header (name + icon) when "Shown" (the
                              default). Set "Hidden" to hide it while still rendering the group's
                              cards.
                            enum:
                            - Shown
                            - Hidden
                            type: string
                          icon:
                            description: |-
                              icon overrides the group header's icon. Same resolution rules as
                              ServiceEntry/Bookmark Icon: a full URL passes through, anything else
                              is resolved as a dashboard-icons slug.
                            maxLength: 256
                            minLength: 1
                            type: string
                          initiallyCollapsed:
                            description: |-
                              initiallyCollapsed collapses this group by default on first load,
                              overriding the Configuration's GroupsInitiallyCollapsed. Ignored when
                              DisableCollapse is set.
                            enum:
                            - Collapsed
                            - Expanded
                            type: string
                          name:
                            description: name is the ServiceEntry Group this entry
                              places and styles.
                            maxLength: 256
                            minLength: 1
                            type: string
                          style:
                            description: style lays the group's cards out in a single
                              row instead of a grid.
                            enum:
                            - row
                            - column
                            type: string
                          useEqualHeights:
                            description: |-
                              useEqualHeights makes every card in this group the same height,
                              overriding the Configuration's UseEqualHeights.
                            enum:
                            - Equal
                            - Auto
                            type: string
                        required:
                        - name
                        type: object
                      maxItems: 64
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: atomic
                    name:
                      description: name is the tab's label.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - groups
                  - name
                  type: object
                maxItems: 32
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              search:
                description: |-
                  search configures the native dashboard's header search box (card
                  filtering + web-search fallthrough).
                minProperties: 1
                properties:
                  filterCards:
                    default: Enabled
                    description: |-
                      filterCards enables as-you-type filtering of service and bookmark
                      cards by name/description, independent of the Enter-to-search
                      fallthrough.
                    enum:
                    - Enabled
                    - Disabled
                    type: string
                  provider:
                    default: duckduckgo
                    description: |-
                      provider is the web search engine Enter submits the query to.
                      "custom" requires URL.
                    enum:
                    - duckduckgo
                    - google
                    - bing
                    - custom
                    type: string
                  target:
                    default: _blank
                    description: |-
                      target controls whether the search results page opens in the same tab
                      or a new one.
                    enum:
                    - _blank
                    - _self
                    type: string
                  url:
                    description: |-
                      url is the search endpoint used when Provider is "custom". The query
                      is appended as a URL-encoded "q" parameter. Must be an http(s) URL —
                      the dashboard passes this straight into a client-side window.open()/
                      href, so a non-http(s) scheme (e.g. "javascript:") would be a stored
                      script-injection vector rather than a search endpoint.
                    maxLength: 2048
                    minLength: 1
                    pattern: ^https?://
                    type: string
                type: object
              startUrl:
                description: |-
                  startUrl is the PWA manifest's start_url, used when the dashboard is
                  installed as an app. Defaults to "/".
                maxLength: 2048
                minLength: 1
                pattern: ^(https?://|/)
                type: string
              target:
                default: _blank
                description: |-
                  target is the default link target for service and bookmark cards.
                  Individual ServiceEntries may override it via their own target.
                enum:
                - _blank
                - _self
                type: string
              theme:
                description: |-
                  theme is the fixed theme, disabling the theme switcher. One of "light"
                  or "dark".
                enum:
                - light
                - dark
                type: string
              title:
                description: |-
                  title is the dashboard's browser tab title and header heading.
                  Defaults to "kubepage" when unset.
                maxLength: 256
                minLength: 1
                type: string
              useEqualHeights:
                description: |-
                  useEqualHeights makes every card in a group the same height. A
                  LayoutGroupSpec's own UseEqualHeights overrides this per group.
                enum:
                - Equal
                - Auto
                type: string
            required:
            - instanceRef
            type: object
          status:
            description: status defines the observed state of Configuration
            minProperties: 1
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Configuration resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
