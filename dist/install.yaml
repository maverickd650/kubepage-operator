apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: infowidgets.page.kubepage.dev
spec:
  group: page.kubepage.dev
  names:
    kind: InfoWidget
    listKind: InfoWidgetList
    plural: infowidgets
    shortNames:
    - piw
    singular: infowidget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Ready
      type: string
    - jsonPath: .spec.instanceRef.name
      name: Instance
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InfoWidget is the Schema for the infowidgets API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of InfoWidget
            properties:
              icon:
                description: |-
                  icon shown to the left of this widget's value(s) in the header strip,
                  matching homepage's Resource component. Resolved the same way as
                  ServiceEntry/Bookmark Icon: a full URL passes through unchanged,
                  anything else is treated as a dashboard-icons slug. Ignored by the
                  "greeting" and "datetime" widget types, which homepage renders without
                  an icon.
                maxLength: 256
                minLength: 1
                type: string
              instanceRef:
                description: instanceRef names the Instance this InfoWidget belongs
                  to.
                properties:
                  name:
                    description: name of the Instance this object belongs to.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              options:
                description: options holds every widget-type-specific field.
                x-kubernetes-preserve-unknown-fields: true
              order:
                description: |-
                  order controls rendering position: widgets are sorted by Order (nil
                  sorts last), ties broken by the InfoWidget object's name, since CRDs
                  have no inherent ordering of their own.
                format: int32
                type: integer
              secrets:
                additionalProperties:
                  description: |-
                    SecretValueSource is an inline value or a reference to a key in a Secret,
                    used for any config field that may hold a credential (e.g. a widget API
                    key). Exactly one of Value or SecretKeyRef must be set; this is enforced at
                    admission by a ValidatingAdmissionPolicy (config/admission), so neither a
                    secret that sets both nor one that sets neither reaches the dashboard, which
                    resolves whichever is set in-process at poll time.
                  properties:
                    secretKeyRef:
                      description: secretKeyRef selects a key of a Secret in the same
                        namespace.
                      properties:
                        key:
                          description: The key of the secret to select from.  Must
                            be a valid secret key.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the Secret or its key must
                            be defined
                          type: boolean
                      required:
                      - key
                      type: object
                      x-kubernetes-map-type: atomic
                    value:
                      description: |-
                        value is a literal value. Avoid this for real credentials; prefer
                        SecretKeyRef so the value isn't stored in the CR.
                      maxLength: 4096
                      minLength: 1
                      type: string
                  type: object
                description: |-
                  secrets are secret-bearing option fields. Merged into Options under the
                  same field names once a renderer for this CRD exists.

                  RBAC note: the same caveat as ServiceEntry's widgets.secrets applies
                  here — see ServiceWidget.Secrets' doc comment. Anyone who can create
                  an InfoWidget in this namespace can read any Secret in it by
                  referencing it via secretKeyRef and pointing this widget's options at
                  a server they control.
                minProperties: 1
                type: object
              type:
                description: type is the widget type, e.g. "resources", "search",
                  "datetime".
                maxLength: 64
                minLength: 1
                type: string
            required:
            - instanceRef
            - type
            type: object
          status:
            description: status defines the observed state of InfoWidget
            minProperties: 1
            properties:
              conditions:
                description: conditions represent the current state of the InfoWidget
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
