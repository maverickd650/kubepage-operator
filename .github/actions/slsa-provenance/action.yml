name: Generate SLSA provenance predicate
description: >
  Writes a SLSA v0.2 build-provenance predicate to provenance.json,
  describing this workflow run rather than any one artifact — none of its
  fields vary per artifact (it's built entirely from the run's own
  RUN_ID/COMMIT/REPO context), so the image, chart, and release binaries all
  attest the identical predicate rather than each generating their own.
  Shared so release.yaml's publish and binaries jobs can't drift apart on
  the builder ID / buildType / entry point they attest to.

outputs:
  path:
    description: Path to the generated predicate file (always provenance.json).
    value: provenance.json

runs:
  using: composite
  steps:
    - name: Generate SLSA build provenance predicate
      shell: bash
      env:
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        COMMIT: ${{ github.sha }}
        REPO: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
      run: |
        jq -n \
          --arg builderId "${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}" \
          --arg buildType "https://github.com/${REPO}/.github/workflows/release.yaml" \
          --arg uri "git+${SERVER_URL}/${REPO}@refs/heads/main" \
          --arg sha1 "${COMMIT}" \
          --arg entryPoint ".github/workflows/release.yaml" \
          --arg invocationId "${RUN_ID}-${RUN_ATTEMPT}" \
          '{
            builder: {id: $builderId},
            buildType: $buildType,
            invocation: {
              configSource: {uri: $uri, digest: {sha1: $sha1}, entryPoint: $entryPoint}
            },
            metadata: {
              buildInvocationId: $invocationId,
              completeness: {parameters: true, environment: false, materials: false},
              reproducible: false
            },
            materials: [{uri: $uri, digest: {sha1: $sha1}}]
          }' > provenance.json
