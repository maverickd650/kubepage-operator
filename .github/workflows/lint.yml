name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Run via `make lint` rather than golangci-lint-action: this module
      # enables the logcheck module plugin (.custom-gcl.yml / .golangci.yml),
      # which only exists in a custom-built golangci-lint binary. The Makefile
      # target builds that custom binary with the toolchain pinned in go.mod,
      # so the linter is both built with a new-enough Go and has logcheck.
      - name: Run linter
        run: make lint
