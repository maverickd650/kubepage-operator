name: Lint

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Check golangci-lint version lockstep with .custom-gcl.yml
        # A Renovate bump of one without the other builds a mismatched
        # custom golangci-lint binary (the mise-installed stock binary vs.
        # the plugin version .custom-gcl.yml asks for) — fail fast here
        # instead.
        run: |
          mise_version="$(grep -E '^golangci-lint = ' .mise/config.toml | sed -E 's/.*"([0-9.]+)".*/\1/')"
          gcl_version="$(grep -E '^version:' .custom-gcl.yml | awk '{print $2}' | sed -E 's/^v//')"
          if [ "$mise_version" != "$gcl_version" ]; then
            echo "::error::golangci-lint version mismatch: .mise/config.toml has $mise_version, .custom-gcl.yml has v$gcl_version"
            exit 1
          fi

      - name: Check GO_VERSION lockstep with [tools] go
        # [env].GO_VERSION feeds the Dockerfile's GO_VERSION build-arg and
        # must match [tools].go (the toolchain mise actually installs) — a
        # Renovate bump of one without the other silently builds release
        # images with a stale Go toolchain.
        run: |
          tools_version="$(mise config get tools.go)"
          env_version="$(grep -E '^GO_VERSION = ' .mise/config.toml | sed -E 's/.*"([0-9.]+)".*/\1/')"
          if [ "$tools_version" != "$env_version" ]; then
            echo "::error::GO_VERSION mismatch: [tools].go is $tools_version, [env].GO_VERSION is $env_version"
            exit 1
          fi

      - name: Cache custom golangci-lint binary
        id: golangci-lint-custom-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bin/golangci-lint-custom
          key: ${{ runner.os }}-golangci-lint-custom-${{ hashFiles('.custom-gcl.yml') }}

      - name: Mark restored binary fresh
        # mise's `golangci-lint-custom` task skips rebuilding when its output is newer
        # than .custom-gcl.yml; checkout always gives that file a fresh mtime, so without
        # this the cache hit would still trigger a rebuild every run.
        if: steps.golangci-lint-custom-cache.outputs.cache-hit == 'true'
        run: touch bin/golangci-lint-custom

      - name: Check linter configuration
        run: mise run lint-config

      - name: Run linter
        run: mise run lint
