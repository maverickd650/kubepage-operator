name: K8s Compatibility

# Floor version: 1.33, not the originally-targeted 1.29 (which would be the
# oldest version needed for CEL XValidation, GA since 1.29). Kind v0.32.0
# (pinned in .mise/config.toml) only ships kindest/node images back to
# v1.33.12 per its release notes — there's no verified 1.29 image to test
# against without pinning an older, unmaintained Kind release. 1.33 still
# exercises CEL XValidation (1.29+) and the config/admission
# ValidatingAdmissionPolicy (1.30+) floors. envtest's own binary index
# (setup-envtest) does still offer 1.29 binaries, but both matrices are
# pinned to the same floor here so "the floor this project tests" has one
# unambiguous answer — see README.md/CLAUDE.md for the documented minimum.
#
# On push, only the floor version (1.33) runs here — the "1.36" entries
# duplicate what Tests/E2E Tests already cover on the same push (mise run
# test derives 1.36 from go.mod, and test-e2e uses kind's default node
# image). The full matrix still runs on the weekly schedule and
# workflow_dispatch, where the duplication is the point.
on:
  schedule:
    - cron: "0 4 * * 1" # weekly Monday at 04:00 UTC
  push:
    branches: [main]
    paths:
      - "api/**"
      - "config/crd/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  IMG: example.com/kubepage-operator:v0.0.1

jobs:
  unit-test-matrix:
    permissions:
      contents: read
    name: Unit Tests (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ${{ github.event_name == 'push' && fromJSON('["1.33"]') || fromJSON('["1.33", "1.36"]') }}
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Running Tests (K8s ${{ matrix.k8s-version }})
        run: mise run test
        env:
          ENVTEST_K8S_VERSION: ${{ matrix.k8s-version }}

  e2e-matrix:
    permissions:
      contents: read
    name: E2E Tests (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Digest pinned from the kind v0.32.0 release notes (oldest node image
      # that release ships) — see the file-level comment above.
      matrix:
        include: ${{ github.event_name == 'push' && fromJSON('[{"k8s-version":"1.33","kind-image":"kindest/node:v1.33.12@sha256:3f5c8443c620245e4d355cfe09e96a91ead32ceaa569d3f1ca9edf0cb2fe2ff4"}]') || fromJSON('[{"k8s-version":"1.33","kind-image":"kindest/node:v1.33.12@sha256:3f5c8443c620245e4d355cfe09e96a91ead32ceaa569d3f1ca9edf0cb2fe2ff4"},{"k8s-version":"1.36","kind-image":""}]') }}
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Read Go version from mise
        id: go-version
        run: echo "value=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build manager image (cached)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ env.IMG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ steps.go-version.outputs.value }}

      - name: Running E2E Tests (K8s ${{ matrix.k8s-version }})
        run: mise run test-e2e
        env:
          SKIP_IMG_BUILD: "1"
          KIND_IMAGE: ${{ matrix.kind-image }}
