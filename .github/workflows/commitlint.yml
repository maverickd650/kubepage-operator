name: Lint Commit Messages

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([a-z0-9._-]+\))?!?: .+'
          if ! grep -qE "$pattern" <<< "$PR_TITLE"; then
            echo "::error::PR title is not a Conventional Commit: \"$PR_TITLE\""
            echo "Expected format: <type>(<optional scope>)!: <description>"
            echo "Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
            echo "See https://www.conventionalcommits.org/"
            exit 1
          fi

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pattern='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([a-z0-9._-]+\))?!?: .+'
          failed=0
          while IFS= read -r sha; do
            parent_count=$(git rev-list --parents -n1 "$sha" | wc -w)
            if [ "$parent_count" -gt 2 ]; then
              continue # skip merge commits
            fi
            subject=$(git log -1 --format=%s "$sha")
            if ! grep -qE "$pattern" <<< "$subject"; then
              echo "::error::Commit $sha is not a Conventional Commit: \"$subject\""
              failed=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$failed" -ne 0 ]; then
            echo "One or more commits do not follow Conventional Commits (https://www.conventionalcommits.org/)."
            echo "release-please relies on these messages to compute version bumps and changelogs."
            exit 1
          fi
