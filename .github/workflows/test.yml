name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Running Tests
        run: mise run test

      - name: Flake-check internal/dashboard under -race -count=5
        run: mise run test-flaky-check

      - name: Check generated files are committed and up to date
        # `mise run test` already regenerates manifests/deepcopy/templ/fmt
        # output above but never touches dist/, so also run
        # helm-chart-refresh here — otherwise a PR that edits *_types.go or a
        # .templ file without committing the regenerated output (including
        # dist/) would pass CI green and leave config/crd/bases/,
        # zz_generated.*.go, *_templ.go, or dist/ stale on main.
        # `git diff` only sees tracked files, so also fail on untracked ones
        # — a brand-new CRD kind generates a *new* file under
        # config/crd/bases/ that a plain diff would silently pass.
        run: |
          mise run helm-chart-refresh
          git diff --exit-code -- config/ api/ internal/ dist/
          untracked="$(git ls-files --others --exclude-standard -- config/ api/ internal/ dist/)"
          if [ -n "$untracked" ]; then
            echo "::error::Untracked generated files (regenerate and commit them):"
            echo "$untracked"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cover.out
          fail_ci_if_error: false
