name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Split into three jobs that run concurrently instead of one long serial job:
# unit tests, the -race -count=5 flake check, and the cross-compile dry-run +
# generated-file drift check each gate the PR independently, so wall clock is
# max(unit, flake, dist) + one setup-go-env instead of the sum of all three.
#
# Branch protection's required status check is pinned to the job name "Test"
# (see skip-docs-checks.yaml's comment on why a required check must never
# stop reporting). Since that check only tracks one job by name, the `test`
# aggregator job below fans in all three real jobs so none of them silently
# becomes optional — without it, only unit-tests would actually gate merges.
jobs:
  unit-tests:
    permissions:
      contents: read
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Running Tests
        run: mise run test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cover.out
          fail_ci_if_error: false

  flake-check:
    permissions:
      contents: read
    name: Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Flake-check internal/dashboard under -race -count=5
        run: mise run test-flaky-check

  dist-dry-run:
    permissions:
      contents: read
    name: Dist Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Dry-run cross-compiling release binaries
        # Catches a platform-specific build break (e.g. a GOOS-guarded file,
        # or a dependency without arm64/windows support) on the PR that
        # introduces it, rather than at release time when release.yaml's own
        # `mise run build-dist` runs for real. dist-bin/ is gitignored, so
        # nothing here needs cleaning up. This also regenerates
        # manifests/deepcopy/templ/fmt output (build-dist's own `depends`),
        # which the drift check below relies on — without running the full
        # `mise run test` suite.
        env:
          VERSION: 0.0.0-dryrun
          REVISION: dryrun
        run: mise run build-dist

      - name: Check generated files are committed and up to date
        # helm-chart-refresh never runs as part of build-dist's `depends`, so
        # run it explicitly — otherwise a PR that edits *_types.go or a
        # .templ file without committing the regenerated output (including
        # dist/) would pass CI green and leave config/crd/bases/,
        # zz_generated.*.go, *_templ.go, or dist/ stale on main. build-dist's
        # own `depends` already ran `mise run schemas` above, so schemas/ is
        # covered by the same diff/untracked-file check below.
        # `git diff` only sees tracked files, so also fail on untracked ones
        # — a brand-new CRD kind generates a *new* file under
        # config/crd/bases/ (or schemas/) that a plain diff would silently
        # pass.
        run: |
          mise run helm-chart-refresh
          git diff --exit-code -- config/ api/ internal/ dist/ schemas/
          untracked="$(git ls-files --others --exclude-standard -- config/ api/ internal/ dist/ schemas/)"
          if [ -n "$untracked" ]; then
            echo "::error::Untracked generated files (regenerate and commit them):"
            echo "$untracked"
            exit 1
          fi

      - name: Validate samples against generated JSON Schemas
        run: mise run schemas-validate

  test:
    name: Test
    needs: [unit-tests, flake-check, dist-dry-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all Tests jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::One or more Tests jobs failed: ${{ toJSON(needs) }}"
          exit 1
