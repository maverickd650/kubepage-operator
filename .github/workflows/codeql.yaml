name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]
  schedule:
    # Weekly scan to catch advisories published after the last code change.
    - cron: "27 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # to upload SARIF results to code scanning
      contents: read # to checkout the code
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Use actions/setup-go rather than mise here: CodeQL's build tracer needs a
      # real `go` binary on PATH, and mise exposes `go` as a shim the tracer
      # can't follow (yields "no source code seen"). Version tracks go.mod.
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # build-mode: none was tried here to skip compiling the project
      # entirely (buildless extraction), but the pinned CodeQL CLI
      # (github/codeql-action v4.37.0, bundling CodeQL 2.26.0) hard-fails Go
      # with "Go does not support the none build mode" — buildless Go
      # extraction isn't available yet on this toolchain, so stick with
      # autobuild.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: autobuild
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      # upload: never + a manual upload-sarif step (below) instead of letting
      # this action upload directly: Go is a built/compiled language under
      # build-mode: autobuild, so codeql-config.yml's paths-ignore (which
      # only filters extraction-time analysis) doesn't stop *_templ.go's
      # inherent templ-codegen "useless assignment" findings from reaching
      # the SARIF — see the NOTE in .github/codeql/codeql-config.yml.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
          upload: never
          output: sarif-results

      - name: Strip generated *_templ.go results from SARIF
        run: |
          set -euo pipefail
          for f in sarif-results/*.sarif; do
            jq '(.runs[].results) |= map(select(
              (.locations // []) | all(.physicalLocation.artifactLocation.uri | test("_templ\\.go$") | not)
            ))' "$f" > "$f.tmp"
            mv "$f.tmp" "$f"
          done

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: sarif-results
          category: "/language:go"
