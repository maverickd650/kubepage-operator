name: Skip docs-only checks

# Lint/Test/E2E Tests are required status checks, but they skip entirely on
# non-code changes (via paths-ignore or paths allow-lists) so CI doesn't run
# for every typo fix. A required check that never runs stays "expected"
# forever and blocks merge, so this workflow runs on changes that DON'T match
# the real workflows' paths lists and reports the same job names as an
# immediate success, satisfying branch protection.
#
# Lint and Test use paths-ignore: ["**.md"], so they fire on everything except
# markdown. E2E Tests uses a paths: allow-list. This skip workflow must fire
# whenever ALL real workflows skip — which is markdown-only changes (covers
# Lint/Test) — plus any change not in the e2e allow-list (covers E2E Tests).
# Since Lint/Test already fire for non-markdown non-code changes, it's safe to
# keep this broad: fire whenever we're NOT touching code paths.
on:
  push:
    branches: [main]
    paths-ignore:
      - "api/**"
      - "internal/**"
      - "cmd/**"
      - "config/**"
      - "dist/**"
      - "test/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".mise/**"
      - ".github/workflows/test-e2e.yml"
      - ".github/workflows/test.yml"
      - ".github/workflows/lint.yml"
      - ".github/actions/**"
      - ".golangci.yml"
      - ".custom-gcl.yml"
  pull_request:
    paths-ignore:
      - "api/**"
      - "internal/**"
      - "cmd/**"
      - "config/**"
      - "dist/**"
      - "test/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".mise/**"
      - ".github/workflows/test-e2e.yml"
      - ".github/workflows/test.yml"
      - ".github/workflows/lint.yml"
      - ".github/actions/**"
      - ".golangci.yml"
      - ".custom-gcl.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping — docs-only change"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping — docs-only change"

  test-chart:
    name: Test Chart
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping — docs-only change"

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping — docs-only change"
