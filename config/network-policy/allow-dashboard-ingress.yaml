# Example NetworkPolicy for dashboard pods (see SECURITY.md's trust model,
# point 3 — dashboard viewers are trusted by network reachability, since the
# dashboard HTTP server has no authentication/authorization of its own).
# This is a template to copy into your own Dashboard's namespace
# and adjust — it is NOT applied by default and NOT referenced by
# config/default/kustomization.yaml, the same as allow-metrics-traffic.yaml.
#
# Equivalent, operator-managed behavior is also available per-Dashboard via
# spec.networkPolicy (see api/v1alpha1/instance_types.go's NetworkPolicySpec)
# without hand-maintaining a manifest like this one; use whichever fits your
# GitOps workflow better.
#
# This policy allows ingress to the dashboard's containerPort only from Pods
# in namespaces labeled "ingress: allowed" (e.g. your ingress controller's
# namespace) — adjust podSelector/namespaceSelector/port to match your
# Dashboard. Deliberately leaves egress unrestricted: widget URLs are
# CRD-supplied by design (see SECURITY.md's explicit non-goals) and a
# generic example can't know which upstreams your ServiceEntries poll.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-ingress
  namespace: default # CHANGE ME: the namespace your Dashboard runs in
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubepage-operator
      app.kubernetes.io/managed-by: DashboardController
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              ingress: allowed # CHANGE ME: label your ingress-controller namespace with this
      ports:
        - port: 8080 # CHANGE ME: must match spec.containerPort
          protocol: TCP
