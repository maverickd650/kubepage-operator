---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - page.kubepage.dev
  resources:
  - bookmarks
  - configurations
  - infowidgets
  - instances
  - serviceentries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - page.kubepage.dev
  resources:
  - bookmarks/finalizers
  - configurations/finalizers
  - infowidgets/finalizers
  - instances/finalizers
  - serviceentries/finalizers
  verbs:
  - update
- apiGroups:
  - page.kubepage.dev
  resources:
  - bookmarks/status
  - configurations/status
  - infowidgets/status
  - instances/status
  - serviceentries/status
  verbs:
  - get
  - patch
  - update
