---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: serviceentries.page.kubepage.dev
spec:
  group: page.kubepage.dev
  names:
    kind: ServiceEntry
    listKind: ServiceEntryList
    plural: serviceentries
    shortNames:
    - psvc
    singular: serviceentry
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Ready
      type: string
    - jsonPath: .spec.instanceRef.name
      name: Instance
      type: string
    - jsonPath: .spec.group
      name: Group
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ServiceEntry is the Schema for the serviceentries API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ServiceEntry
            properties:
              description:
                type: string
              group:
                description: |-
                  Group is the name of the (top-level) group this entry belongs to.
                  Entries sharing a Group are rendered together.
                minLength: 1
                type: string
              hideErrors:
                description: |-
                  HideErrors suppresses a widget's error text on the card (e.g. for a
                  service that is expected to be intermittently unreachable). Defaults
                  to false.
                type: boolean
              href:
                description: Href makes the card's title a link to the service.
                type: string
              icon:
                type: string
              instanceRef:
                description: InstanceRef names the Instance this ServiceEntry belongs
                  to.
                properties:
                  name:
                    description: Name of the Instance this object belongs to.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              name:
                description: Name is the service's display name (the card title).
                minLength: 1
                type: string
              order:
                description: |-
                  Order controls rendering position: groups and entries are sorted by
                  Order (nil sorts last), ties broken by Name, since CRDs have no
                  inherent ordering but the dashboard's groups/entries are displayed in a
                  fixed order.
                format: int32
                type: integer
              ping:
                description: |-
                  Ping is a URL probed over HTTP for reachability and latency, shown as
                  an up/down status on the card. (Raw ICMP is not used, so a pod needs
                  no elevated capabilities.)
                pattern: ^https?://
                type: string
              showStats:
                description: |-
                  ShowStats controls whether the polled widget fields are displayed on
                  the card. Defaults to true; set false to show only the title/icon/
                  description (and any monitor status).
                type: boolean
              siteMonitor:
                description: |-
                  SiteMonitor is a URL probed over HTTP, shown as an up/down status with
                  response latency on the card.
                pattern: ^https?://
                type: string
              statusStyle:
                description: |-
                  StatusStyle controls how the Ping/SiteMonitor status renders: "dot" a
                  colored status dot, "basic" up/down text. Ignored unless Ping or
                  SiteMonitor is set.
                enum:
                - dot
                - basic
                type: string
              target:
                description: |-
                  Target overrides the Configuration's default link target for this
                  card's Href ("_blank" opens a new tab, "_self" the same tab).
                enum:
                - _blank
                - _self
                type: string
              widgets:
                description: |-
                  Widgets attached to this service. Zero, one, or many are allowed; the
                  dashboard polls each one independently and shows its fields on the
                  card.
                items:
                  description: |-
                    ServiceWidget configures one of the native dashboard's pollable widgets
                    (internal/dashboard's Widget interface) for a service card. Type and URL
                    are typed because nearly every widget has them; everything else
                    (widget-type-specific options) goes in Config. Secret-bearing fields (e.g.
                    API tokens) go in Secrets instead of Config: the dashboard resolves them
                    directly in-process at poll time, so the plaintext value never appears in
                    pod env, a ConfigMap, or a projected file.
                  properties:
                    config:
                      description: |-
                        Remaining widget-type-specific options (e.g. PrometheusMetric's
                        "query", Cloudflared's "accountId"/"tunnelId").
                      x-kubernetes-preserve-unknown-fields: true
                    secrets:
                      additionalProperties:
                        description: |-
                          SecretValueSource is an inline value or a reference to a key in a Secret,
                          used for any config field that may hold a credential (e.g. a widget API
                          key). Exactly one of Value or SecretKeyRef must be set; this is enforced at
                          admission by a ValidatingAdmissionPolicy (config/admission), so neither a
                          secret that sets both nor one that sets neither reaches the dashboard, which
                          resolves whichever is set in-process at poll time.
                        properties:
                          secretKeyRef:
                            description: SecretKeyRef selects a key of a Secret in
                              the same namespace.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must
                                  be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key
                                  must be defined
                                type: boolean
                            required:
                            - key
                            type: object
                            x-kubernetes-map-type: atomic
                          value:
                            description: |-
                              Value is a literal value. Avoid this for real credentials; prefer
                              SecretKeyRef so the value isn't stored in the CR.
                            type: string
                        type: object
                      description: |-
                        Secret-bearing widget fields (commonly "token", sometimes "username"/
                        "password" depending on widget type), resolved directly by the
                        dashboard backend rather than stored inline.
                      type: object
                    type:
                      description: |-
                        Widget type, e.g. "plex", "grafana", "unifi". See internal/dashboard
                        for the registered set.
                      minLength: 1
                      type: string
                    url:
                      description: Base URL the widget talks to.
                      pattern: ^https?://
                      type: string
                  required:
                  - type
                  type: object
                type: array
            required:
            - group
            - instanceRef
            - name
            type: object
          status:
            description: status defines the observed state of ServiceEntry
            properties:
              conditions:
                description: conditions represent the current state of the ServiceEntry
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
