# ValidatingAdmissionPolicies enforcing the SecretValueSource invariant
# documented in api/v1alpha1/common_types.go: every secret-bearing field must
# set exactly one of `value` or `secretKeyRef`. Without this, a secret that
# sets neither only fails later as a card error at poll time
# (internal/dashboard/poller.go resolveSecret), and one that sets both is
# silently ambiguous. CEL admission catches both at apply time, with no webhook
# server / certificate to manage.
#
# Requires Kubernetes v1.30+ (ValidatingAdmissionPolicy is GA from 1.30).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: serviceentry-secret-source
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceentries"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            (has(w.secrets[k].value) ? 1 : 0) + (has(w.secrets[k].secretKeyRef) ? 1 : 0) == 1))
      message: "each ServiceEntry widget secret must set exactly one of value or secretKeyRef"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: serviceentry-secret-source
spec:
  policyName: serviceentry-secret-source
  validationActions: ["Deny"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: infowidget-secret-source
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        !has(object.spec.secrets) || object.spec.secrets.all(k,
          (has(object.spec.secrets[k].value) ? 1 : 0) + (has(object.spec.secrets[k].secretKeyRef) ? 1 : 0) == 1)
      message: "each InfoWidget secret must set exactly one of value or secretKeyRef"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: infowidget-secret-source
spec:
  policyName: infowidget-secret-source
  validationActions: ["Deny"]
