# Warn-action ValidatingAdmissionPolicies flagging credential-shaped inline
# `value` (docs/security-review.md P2.5): SecretValueSource.value stores a
# plaintext value directly in the CR — persisted in etcd, any GitOps repo
# it's committed to, and `kubectl get -o yaml` output. That's fine (and
# useful) for genuinely non-secret config (e.g. city coordinates for a
# weather widget), but a field named "token"/"password"/"apiKey"/etc. using
# `value` instead of `secretKeyRef` is very likely an accidental plaintext
# credential.
#
# validationActions: ["Warn"] rather than ["Deny"]: field naming is a
# heuristic, not a guarantee (a widget could legitimately have a
# non-secret-shaped field it happens to name "token"), so this surfaces a
# `Warning:` line on `kubectl apply` instead of rejecting the object outright
# — unlike secret_source_policy.yaml's Deny policies, which enforce an
# actual schema invariant.
#
# Requires Kubernetes v1.30+ (ValidatingAdmissionPolicy is GA from 1.30), same
# as every other policy under config/admission/.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: servicecard-credential-shaped-value
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["servicecards"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
      message: >-
        a widget secret field name looks credential-shaped (token/password/apiKey/
        secret/credential/privateKey) but uses an inline "value" instead of
        "secretKeyRef" — this stores the plaintext in the ServiceCard object
        itself (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef
        for real credentials; ignore this warning if the field name is a false
        positive (e.g. a genuinely non-secret option that happens to be named
        this way).
      reason: Invalid
    # Same check, one level deeper: the multi-card form (spec.services) nests
    # each card's own widgets under services[*].widgets[*] instead of
    # spec.widgets directly (see ServiceCardSpec.Services's doc comment in
    # api/v1alpha1/servicecard_types.go). A separate expression rather than
    # folding this into the one above keeps each expression's CEL cost within
    # budget and the message specific to which form triggered it.
    - expression: >-
        !has(object.spec.services) || object.spec.services.all(e,
          !has(e.widgets) || e.widgets.all(w,
            !has(w.secrets) || w.secrets.all(k,
              !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)')))))
      message: >-
        a widget secret field name under services[].widgets[] looks
        credential-shaped (token/password/apiKey/secret/credential/privateKey)
        but uses an inline "value" instead of "secretKeyRef" — this stores the
        plaintext in the ServiceCard object itself (etcd, any GitOps repo,
        `kubectl get -o yaml`). Prefer secretKeyRef for real credentials;
        ignore this warning if the field name is a false positive (e.g. a
        genuinely non-secret option that happens to be named this way).
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: servicecard-credential-shaped-value
spec:
  policyName: servicecard-credential-shaped-value
  validationActions: ["Warn"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: infowidget-credential-shaped-value
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        !has(object.spec.secrets) || object.spec.secrets.all(k,
          !(has(object.spec.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)')))
      message: >-
        a secret field name looks credential-shaped (token/password/apiKey/secret/
        credential/privateKey) but uses an inline "value" instead of
        "secretKeyRef" — this stores the plaintext in the InfoWidget object itself
        (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef for
        real credentials; ignore this warning if the field name is a false
        positive (e.g. a genuinely non-secret option that happens to be named
        this way).
      reason: Invalid
    # Same check, one level deeper: the multi-widget form (spec.widgets) nests
    # each entry's own secrets under widgets[*].secrets instead of
    # spec.secrets directly (see InfoWidgetSpec.Widgets's doc comment in
    # api/v1alpha1/infowidget_types.go). A separate expression rather than
    # folding this into the one above keeps each expression's CEL cost within
    # budget and the message specific to which form triggered it. Unlike
    # ServiceCard's nested rule, caCert is deliberately excluded here (and
    # from the servicecard rule too): a CA certificate isn't itself a
    # credential-shaped field name.
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          !has(w.secrets) || w.secrets.all(k,
            !(has(w.secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
      message: >-
        a secret field name under widgets[].secrets looks credential-shaped
        (token/password/apiKey/secret/credential/privateKey) but uses an
        inline "value" instead of "secretKeyRef" — this stores the plaintext
        in the InfoWidget object itself (etcd, any GitOps repo, `kubectl get
        -o yaml`). Prefer secretKeyRef for real credentials; ignore this
        warning if the field name is a false positive (e.g. a genuinely
        non-secret option that happens to be named this way).
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: infowidget-credential-shaped-value
spec:
  policyName: infowidget-credential-shaped-value
  validationActions: ["Warn"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: dashboard-credential-shaped-value
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["dashboards"]
  validations:
    # spec.widgetDefaults (#109) is keyed by widget type, one level deeper
    # again than ServiceCard/InfoWidget's own secrets maps: object.spec.
    # widgetDefaults[type].secrets[key] instead of object.spec.secrets[key].
    - expression: >-
        !has(object.spec.widgetDefaults) || object.spec.widgetDefaults.all(t,
          !has(object.spec.widgetDefaults[t].secrets) || object.spec.widgetDefaults[t].secrets.all(k,
            !(has(object.spec.widgetDefaults[t].secrets[k].value) && k.matches('(?i)(token|password|passwd|secret|api[_-]?key|credential|private[_-]?key)'))))
      message: >-
        a widgetDefaults secret field name looks credential-shaped (token/password/apiKey/
        secret/credential/privateKey) but uses an inline "value" instead of
        "secretKeyRef" — this stores the plaintext in the Dashboard object
        itself (etcd, any GitOps repo, `kubectl get -o yaml`). Prefer secretKeyRef
        for real credentials; ignore this warning if the field name is a false
        positive (e.g. a genuinely non-secret option that happens to be named
        this way).
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: dashboard-credential-shaped-value
spec:
  policyName: dashboard-credential-shaped-value
  validationActions: ["Warn"]
