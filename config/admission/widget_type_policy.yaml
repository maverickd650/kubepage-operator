# ValidatingAdmissionPolicies rejecting unknown widget types at apply time.
# Without these, a typo'd or unsupported type (e.g. "plexx") is accepted by the
# CRD schema and only surfaces later as a card error at poll time
# (internal/dashboard/poller.go: "unsupported widget type"). CEL admission
# turns it into a `kubectl apply` error instead, with no webhook server /
# certificate to manage.
#
# The allowed sets are the widget types registered in internal/dashboard
# (each widget's init() Register call) split by where they're used:
#   - ServiceEntry cards: the HTTP-polled service widgets.
#   - InfoWidget header strip: the static types (greeting/datetime, rendered by
#     internal/dashboard/server.go) plus the pollable header widgets
#     (openmeteo, and the cluster-only kubemetrics).
# IMPORTANT: keep these lists in sync when a widget is added or removed in
# internal/dashboard. internal/controller/widget_type_policy_test.go loads this
# manifest against a real apiserver, so a drift that rejects a valid type fails
# the test suite.
#
# Requires Kubernetes v1.30+ (ValidatingAdmissionPolicy is GA from 1.30).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: serviceentry-widget-type
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceentries"]
  validations:
    - expression: >-
        !has(object.spec.widgets) || object.spec.widgets.all(w,
          w.type in ['plex', 'stash', 'paperlessngx', 'grafana', 'prometheus',
            'prometheusmetric', 'unifi', 'truenas', 'cloudflared', 'linkwarden',
            'homeassistant', 'mealie', 'customapi'])
      message: "each ServiceEntry widget type must be a supported service widget (plex, stash, paperlessngx, grafana, prometheus, prometheusmetric, unifi, truenas, cloudflared, linkwarden, homeassistant, mealie, customapi)"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: serviceentry-widget-type
spec:
  policyName: serviceentry-widget-type
  validationActions: ["Deny"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: infowidget-type
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["page.kubepage.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["infowidgets"]
  validations:
    - expression: >-
        object.spec.type in ['greeting', 'datetime', 'logo', 'openmeteo', 'kubemetrics',
          'glances', 'longhorn', 'openweathermap']
      message: "InfoWidget type must be one of greeting, datetime, logo, openmeteo, kubemetrics, glances, longhorn, openweathermap"
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: infowidget-type
spec:
  policyName: infowidget-type
  validationActions: ["Deny"]
