apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-greeting
spec:
  dashboardRef:
    name: dashboard-sample
  type: greeting
  order: 1
  options:
    text: Welcome to the lab
---
apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-datetime
spec:
  dashboardRef:
    name: dashboard-sample
  type: datetime
  order: 2
---
apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-weather
spec:
  dashboardRef:
    name: dashboard-sample
  type: openmeteo
  order: 3
  options:
    latitude: 51.5074
    longitude: -0.1278
    units: metric
    label: London
---
apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-longhorn
spec:
  dashboardRef:
    name: dashboard-sample
  type: longhorn
  order: 4
  options:
    url: http://longhorn-frontend.longhorn-system:80
---
apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-kubemetrics
spec:
  dashboardRef:
    name: dashboard-sample
  # Cluster-wide CPU/memory usage from metrics-server (metrics.k8s.io).
  # Requires metrics-server installed in the cluster; the operator grants the
  # dashboard pod cluster-scoped node/metrics read access on demand.
  type: kubemetrics
  order: 5
