apiVersion: page.kubepage.dev/v1alpha1
kind: Bookmark
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: bookmark-sample
spec:
  # dashboardRef is omitted: this namespace has exactly one Dashboard
  # (dashboard-sample), so this Bookmark binds to it automatically.
  # group is the default group for any entry below that doesn't set its own
  # (Wikipedia overrides it to "Reference").
  group: Developer
  bookmarks:
    - name: Github
      href: https://github.com/
      abbr: GH
    - name: Go Docs
      href: https://pkg.go.dev/
      abbr: GO
      description: Go package documentation
    - name: Wikipedia
      group: Reference
      href: https://wikipedia.org/
      abbr: WK
      target: _self
