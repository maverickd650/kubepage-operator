apiVersion: page.kubepage.dev/v1alpha1
kind: InfoWidget
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: infowidget-multi-sample
spec:
  dashboardRef:
    name: dashboard-sample
  # widgets defines the whole header strip in one object instead of one
  # InfoWidget per widget; there's no group concept here (header widgets are
  # a flat, ordered list), so every entry only needs order/type/options.
  widgets:
    - type: greeting
      order: 1
      options:
        text: Welcome to the lab
    - type: datetime
      order: 2
    - type: openmeteo
      order: 3
      options:
        latitude: 51.5074
        longitude: -0.1278
        units: metric
        label: London
    - type: kubemetrics
      order: 4
