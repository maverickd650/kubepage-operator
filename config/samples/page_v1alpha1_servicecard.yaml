apiVersion: page.kubepage.dev/v1alpha1
kind: ServiceCard
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: servicecard-sample
spec:
  dashboardRef:
    name: dashboard-sample
  # group is the default group for any entry below that doesn't set its own
  # (Grafana overrides it to "Observability").
  group: Media
  services:
    - name: Plex
      href: http://plex.example.com
      icon: plex
      description: Media server
      siteMonitor: http://plex.example.com
      statusStyle: dot
      widgets:
        - type: plex
          url: http://plex.example.com
          secrets:
            token:
              secretKeyRef:
                name: plex-credentials
                key: token
    - name: Stash
      href: http://stash.example.com
      icon: stash
      description: A type of media server.
      siteMonitor: http://stash.example.com
      statusStyle: dot
    - name: Grafana
      group: Observability
      href: http://grafana.example.com
      icon: grafana
      description: Observability dashboard for Prometheus and other metrics
      siteMonitor: http://grafana.example.com
      statusStyle: dot
      widgets:
        # admin/stats requires Grafana server-admin credentials; a scoped
        # viewer/editor API key/token will not work here.
        - type: grafana
          url: http://grafana.example.com
          secrets:
            username:
              secretKeyRef:
                name: grafana-credentials
                key: username
            password:
              secretKeyRef:
                name: grafana-credentials
                key: password
