apiVersion: page.kubepage.dev/v1alpha1
kind: ServiceCard
metadata:
  labels:
    app.kubernetes.io/name: kubepage-operator
    app.kubernetes.io/managed-by: kustomize
  name: servicecard-sample
spec:
  # dashboardRef is omitted: this namespace has exactly one Dashboard
  # (dashboard-sample), so this ServiceCard binds to it automatically.
  # group is the default group for any entry below that doesn't set its own
  # (Grafana overrides it to "Observability").
  group: Media
  services:
    # The split-URL shape: href is what the browser opens (through the
    # ingress); internalUrl is what the dashboard pod itself polls and
    # probes (in-cluster Service DNS). "monitor: self" probes that same
    # base URL (internalUrl when set, else href), and the plex widget
    # inherits it too — each distinct URL is written exactly once.
    # internalUrl: auto has the dashboard pod derive that in-cluster URL
    # itself from app (below) — a Service named "plex", its "http"-named
    # port else its first port — instead of it being spelled out by hand
    # (see service_plex.yaml in this directory).
    - name: Plex
      href: https://plex.example.com
      internalUrl: auto
      icon: plex
      description: Media server
      monitor: self
      # app pairs the HTTP monitor with a Kubernetes pod monitor: pods are
      # located by the app.kubernetes.io/name=plex label in this ServiceCard's
      # own namespace (homepage parity, see docs/design/combined-monitor.md),
      # and the card shows both statuses independently.
      app: plex
      statusStyle: dot
      widgets:
        # secretRef names a Secret whose keys already match the widget's
        # field names ("token"): every key becomes a resolved secret field,
        # so this is equivalent to the long-form secrets.token.secretKeyRef
        # (name: plex-credentials, key: token) — see docs/configuration/secrets.md.
        - type: plex
          secretRef: plex-credentials
    # The one-URL shape: href doubles as the monitor probe target via
    # "monitor: self" — no URL is ever repeated.
    - name: Stash
      href: http://stash.example.com
      icon: stash
      description: A type of media server.
      monitor: self
      statusStyle: dot
    - name: Grafana
      group: Observability
      href: http://grafana.example.com
      icon: grafana
      description: Observability dashboard for Prometheus and other metrics
      monitor: self
      statusStyle: dot
      widgets:
        # admin/stats requires Grafana server-admin credentials; a scoped
        # viewer/editor API key/token will not work here. The widget inherits
        # its base URL from href. The grafana-credentials Secret holds both
        # "username" and "password" keys, so secretRef resolves both fields
        # in one line instead of a secrets.username/secrets.password pair.
        - type: grafana
          secretRef: grafana-credentials
    # A "/"-separated group nests this card inside the "Media" group as a
    # "Movies" subgroup (homepage parity: nested service groups, see
    # https://gethomepage.dev/configs/services/#nested-groups and
    # docs/design/nested-groups.md). Media itself needs no direct card of
    # its own — the dashboard still renders a "Media" parent group around
    # "Movies" — but Plex/Stash above already give it one.
    - name: Radarr
      group: Media/Movies
      href: http://radarr.example.com
      icon: radarr
      description: Movie collection manager
      # monitor also accepts an explicit URL when the probe target differs
      # from the entry's own base URL.
      monitor: http://radarr.example.com/ping
      statusStyle: dot
