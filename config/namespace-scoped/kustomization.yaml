# Namespace-scoped install overlay (docs/security-review.md P2.3): binds the
# manager's ClusterRole (config/rbac/role.yaml, generated by `mise run
# manifests` from the +kubebuilder:rbac markers in
# internal/controller/instance_controller.go) via a namespaced RoleBinding
# in each namespace the manager should watch, instead of the cluster-wide
# ClusterRoleBinding config/default installs by default — so operators who
# don't want the manager holding "secrets get" (and everything else in
# manager-role) cluster-wide can scope it down to only the namespace(s) they
# actually run Dashboards in. Pair this with the manager's own
# --watch-namespaces flag (cmd/main.go) so its controller-runtime cache is
# scoped the same way, not just its RBAC.
#
# Trade-off: the kubemetrics InfoWidget's cluster-scoped RBAC provisioning
# (nodes, metrics.k8s.io, and the ClusterRole/ClusterRoleBinding pair it
# creates per Dashboard — see internal/controller/dashboard_rbac.go's
# reconcileClusterMetricsRBAC) still needs cluster-scoped access: a
# namespaced RoleBinding can never grant access to cluster-scoped resources,
# no matter what its ClusterRole contains. This overlay does not attempt to
# preserve that — if you use it, kubemetrics InfoWidgets won't work
# (they'll fail RBAC checks, surfaced as a card error, not a crash).
# Everything else (Deployments, Services, Ingresses, NetworkPolicies, the
# per-Dashboard ServiceAccount/Secret/Role/RoleBinding provisioning, ...)
# works the same, scoped to the namespace(s) below.
#
# Usage:
#   1. Copy this directory.
#   2. Replace WATCHED_NAMESPACE in rolebinding.yaml with your target
#      namespace (and copy that file, with a distinct metadata.name, once
#      per additional namespace you want the manager to watch).
#   3. Add manager_watch_namespaces_patch.yaml's --watch-namespaces value to
#      match the same namespace(s), comma-separated.
#   4. `kustomize build` this directory and verify the output before
#      applying — this overlay assumes config/default's current
#      namePrefix (kubepage-operator-) and namespace (kubepage-operator-system);
#      if either changes, update delete_cluster_role_binding.yaml and
#      rolebinding.yaml's roleRef/subjects to match.
resources:
- ../default
- rolebinding.yaml

patches:
# Strategic-merge delete, matched by this patch's own apiVersion/kind/name
# rather than an explicit target: selector (equivalent to the classic
# patchesStrategicMerge field) — replaced by rolebinding.yaml's namespaced
# RoleBinding above.
- path: delete_cluster_role_binding.yaml
- path: manager_watch_namespaces_patch.yaml
  target:
    kind: Deployment
    labelSelector: control-plane=controller-manager
