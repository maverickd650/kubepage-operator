coverage:
  status:
    # Project coverage must not regress by more than 2% from the base commit.
    # `target: auto` (rather than a fixed percentage) avoids having to pick
    # and maintain an absolute number for a codebase that mixes well-tested
    # reconciliation/widget logic with wiring-only functions (SetupWithManager,
    # dashboard.Run, poller.Run) that pull the package average down.
    project:
      default:
        target: auto
        threshold: 2%
        informational: false
    # New/changed lines in a PR should be reasonably well-tested even though
    # the project-wide average (currently ~66-71% per package) is dragged
    # down by wiring code — unlike the project check, this is a real,
    # PR-blocking floor.
    patch:
      default:
        target: 70%
        informational: false

comment:
  require_changes: true

# Exclude code that isn't meaningfully unit-testable from coverage:
#  - cmd/main.go is the manager entry point (wiring only, exercised via e2e).
#  - test/** are e2e/test helpers, not production code.
#  - **/zz_generated*.go are kubebuilder-generated DeepCopy methods.
#  - api/** is generated scheme registration plus declaration-only CRD types.
ignore:
  - "cmd/**"
  - "test/**"
  - "**/zz_generated*.go"
  - "api/**"
